<!doctype html>
<html lang="en" data-theme="light" data-jargon="meta">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nomos · Advisor</title>
  <link rel="stylesheet" href="/static/assets/nomos.css">
  <style>
    /* Page-local layout only. Components live in nomos.css. */
    html, body { overflow: hidden; }
    .shell { display: flex; height: calc(100vh - 56px); overflow: hidden; }
    .sidebar { width: 220px; flex-shrink: 0; padding: 22px 0; display: flex; flex-direction: column; border-right: 1px solid var(--hair); background: var(--paper); overflow-y: auto; }
    .side-group { padding: 14px 22px 4px; }
    .side-group .label { color: var(--ink-4); }
    .side-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 22px; font-size: 13.5px; color: var(--ink-2); cursor: pointer; border-left: 2px solid transparent; transition: background .12s, color .12s, border-color .12s; }
    .side-item:hover { background: var(--paper-2); color: var(--ink); }
    .side-item.on { color: var(--ink); background: var(--paper-2); border-left-color: var(--ochre); font-weight: 500; }
    .side-item .badge { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); }
    .side-foot { margin-top: auto; padding: 16px 22px; border-top: 1px solid var(--hair); font-size: 11.5px; color: var(--ink-3); line-height: 1.7; }
    .main { flex: 1; overflow-y: auto; background: var(--paper); }
    .demo-banner { display: none; padding: 9px 28px; background: var(--ochre-bg); color: var(--ochre); font-size: 12.5px; border-bottom: 1px solid var(--hair); }
    .demo-banner.on { display: block; }
    .page { max-width: 1240px; margin: 0 auto; padding: 28px 36px 96px; }
    .page-h { display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: end; padding: 22px 0 18px; border-bottom: 1px solid var(--hair); margin-bottom: 24px; }
    .page-h .num { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
    .page-h h1 { font-family: var(--display); font-weight: 400; font-size: 48px; letter-spacing: -.02em; line-height: 1; margin: 8px 0 12px; }
    .page-h .lede { font-family: var(--display); font-size: 17px; line-height: 1.5; color: var(--ink-2); max-width: 720px; }
    .page-h .aside { display: flex; gap: 10px; align-items: center; }
    .stack { display: flex; flex-direction: column; gap: 22px; }
    .tabs { display: flex; border-bottom: 1px solid var(--hair); margin-bottom: 22px; flex-wrap: wrap; }
    .tab { padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--ink-3); background: transparent; border: 0; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
    .tab:hover { color: var(--ink); }
    .tab.on { color: var(--ink); border-bottom-color: var(--ochre); font-weight: 500; }
    .kv { display: grid; grid-template-columns: 200px 1fr; gap: 8px 16px; font-size: 13px; color: var(--ink-2); }
    .kv dt { color: var(--ink-3); font-family: var(--mono); font-size: 11px; letter-spacing: .04em; padding-top: 2px; text-transform: uppercase; }
    .id-cell { font-family: var(--mono); color: var(--ochre); cursor: pointer; }
    .detail-back { background: transparent; border: 0; cursor: pointer; font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: .04em; text-transform: uppercase; padding: 4px 0 0; margin-bottom: 8px; }
    .detail-back:hover { color: var(--ink); }
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar .input { width: 280px; }
    .toolbar select.input { width: 220px; }
    .action-row { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px dashed var(--hair); }
    .action-row:last-child { border-bottom: 0; }
    .action-row .a-meta { flex: 1; min-width: 0; }
    .action-row .a-title { font-size: 13.5px; color: var(--ink); margin-bottom: 4px; }
    .action-row .a-sub { font-size: 11.5px; color: var(--ink-3); }
    .action-row .a-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .dp-tile { padding: 18px 22px; border: 1px solid var(--hair); border-radius: var(--r-md); background: var(--paper); display: flex; flex-direction: column; gap: 4px; }
    .dp-tile .dp-value { font-family: var(--display); font-size: 30px; letter-spacing: -.01em; color: var(--ink); line-height: 1.05; margin: 4px 0 8px; }
    .cmt { padding: 12px 14px; border: 1px solid var(--hair); border-radius: var(--r-sm); margin-bottom: 8px; background: var(--paper); }
    .cmt-open { border-left: 2px solid var(--ochre); }
    .cmt-resolved { border-left: 2px solid var(--green); opacity: .85; }
    .cmt-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); margin-bottom: 5px; display: flex; gap: 10px; flex-wrap: wrap; }
    .cmt-text { font-size: 13px; color: var(--ink); }
    .topbar-r { display: flex; align-items: center; gap: 12px; }
    .topbar-r .clock { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
    .pulse { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    @media (max-width: 900px) { .sidebar { display: none; } .page { padding: 22px 18px 80px; } }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">N</div>
      <div class="logo-word">Nomos</div>
      <span class="chip mono" style="margin-left:8px;">Advisor</span>
    </div>
    <div class="topbar-r">
      <span id="chain-chip" class="chip" aria-live="polite" title="Audit-trail integrity">
        <span class="dot" aria-hidden="true"></span>
        <span class="chain-text">Chain integrity: checking…</span>
      </span>
      <span id="topbar-clock" class="clock"></span>
      <button id="demo-btn" class="btn btn-ghost btn-sm" type="button">Demo mode</button>
      <button id="sign-out-btn" class="btn btn-ghost btn-sm" type="button">Sign out</button>
    </div>
  </header>

  <div id="demo-banner" class="demo-banner" role="status">
    Demonstration mode — uploaded documents are auto-validated for testing.
  </div>

  <div class="shell">
    <nav class="sidebar" aria-label="Primary">
      <div class="side-group"><span class="label">Portfolio</span></div>
      <div class="side-item on" data-view="dashboard">Dashboard</div>
      <div class="side-item" data-view="contracts">
        <span>Contracts</span>
        <span class="badge" id="badge-contracts">—</span>
      </div>
      <div class="side-group" style="margin-top:18px;"><span class="label">Operations</span></div>
      <div class="side-item" data-view="oracle">Oracle</div>
      <div class="side-item" data-view="audit">Audit</div>
      <div class="side-item" data-view="notices">Notices</div>
      <div class="side-group" style="margin-top:18px;"><span class="label">Reference</span></div>
      <div class="side-item" data-view="library">Library</div>

      <div class="side-foot">
        Firm<br>
        <span class="strong">Linklaters LLP</span><br><br>
        Calculation Agent · Party A
      </div>
    </nav>

    <main class="main">
      <div id="conn-banner" class="conn-banner hidden" role="status" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span>Connection to the API interrupted. Retrying…</span>
      </div>
      <div id="page" class="page" aria-live="polite"></div>
    </main>
  </div>

  <div id="modal-host"></div>

  <script type="module">
    import {
      apiFetch,
      formatTimestamp,
      formatRelative,
      formatDecimalRate,
      toast,
    } from "/static/assets/nomos-ui.js";

    /* ──────────────────────────────────────────────────────────────────
       Dictionaries
       ────────────────────────────────────────────────────────────────── */
    const RULE_LABELS = {
      "R-001": "Failure to pay",
      "R-002": "Breach of agreement",
      "R-003": "Cross default",
      "R-004": "Illegality",
      "R-005": "Tax event",
      "R-006": "Material adverse change",
    };
    const SEVERITY_CHIPS = {
      "warning":           { cls: "chip-ochre", label: "Warning" },
      "potential_trigger": { cls: "chip-blue",  label: "Potential trigger" },
      "trigger":           { cls: "chip-red",   label: "Trigger" },
    };
    const METRIC_LABELS = {
      "ESTR":        "Euro short-term rate",
      "EURIBOR_3M":  "3-month EURIBOR",
      "EURIBOR_6M":  "6-month EURIBOR",
      "EURIBOR_12M": "12-month EURIBOR",
    };
    const SOURCE_LABELS = {
      "ecb_sdw_v1": { plain: "European Central Bank", jargon: "ECB SDW" },
      "fake_v1":    { plain: "Synthetic source",      jargon: "FAKE" },
    };
    const NOTICE_TYPES = [
      { v: "FAILURE_TO_PAY",      l: "Failure to pay",       j: "§5(a)(i)" },
      { v: "BREACH_OF_AGREEMENT", l: "Breach of agreement",  j: "§5(a)(ii)" },
      { v: "ETD_DESIGNATION",    l: "Early termination designation", j: "§6(a)" },
      { v: "DELIVERY_REMINDER",  l: "Delivery reminder",     j: "§4(a)" },
      { v: "TAX_CHANGE",         l: "Tax status change",     j: "§4(d)" },
    ];

    /* ──────────────────────────────────────────────────────────────────
       Module-scope state
       ────────────────────────────────────────────────────────────────── */
    const state = {
      contracts: [],
      details: {},
      dd: {},
      comments: {},
      audit: {},
      auditGlobal: [],
      notices: [],
      oracle: {},
      v2: { health: null, latest: null, triggers: [], chain: null },
      loaded: false,
      error: null,
      demo: false,
    };
    let view = "dashboard";
    let exContract = null;
    let detailTab = "summary";
    let ctQuery = "";
    let ctSort = "status";
    let auditClientFilter = "";

    /* ──────────────────────────────────────────────────────────────────
       Auth gate + sign out
       ────────────────────────────────────────────────────────────────── */
    (function gateRole() {
      const r = localStorage.getItem("nomos_role");
      if (r && r !== "advisor") window.location.href = "/";
    })();
    function signOut() {
      localStorage.removeItem('nomos_role');
      window.location.href = '/';
    }
    document.getElementById("sign-out-btn").addEventListener("click", signOut);

    /* ──────────────────────────────────────────────────────────────────
       Utilities
       ────────────────────────────────────────────────────────────────── */
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => (
      { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]
    ));
    const eur = (v, d=0) => v == null
      ? "—"
      : "€" + Number(v).toLocaleString("en-GB", { minimumFractionDigits: d, maximumFractionDigits: d });
    const eurM = (v) => v == null ? "—" : "€" + (Number(v) / 1e6).toFixed(1) + "M";
    const pct = (v) => v == null ? "—" : (Number(v) * 100).toFixed(3) + "%";
    const today = () => new Date().toISOString().slice(0, 10);

    function statusChip(status) {
      const map = {
        ACTIVE:               { cls: "chip-green",  text: "Active" },
        PENDING_SIGNATURE:    { cls: "chip-ochre",  text: "Pending signature" },
        PENDING_INITIATOR:    { cls: "chip-ochre",  text: "Pending creator signature" },
        PENDING_COUNTERPARTY: { cls: "chip-blue",   text: "Pending counterparty signature" },
        PENDING_ADVISOR_B:    { cls: "chip-ochre",  text: "Awaiting advisor B" },
        PENDING_SIGNATURES:   { cls: "chip-ochre",  text: "Pending signatures" },
        SUSPENDED:            { cls: "chip-red",    text: "Suspended" },
        TERMINATED:           { cls: "chip-",       text: "Terminated" },
        EARLY_TERM_NOTIFIED:  { cls: "chip-red",    text: "Early termination notified" },
      };
      const m = map[status] || { cls: "chip-", text: String(status || "—").replace(/_/g, " ") };
      return `<span class="chip ${m.cls}"><span class="dot"></span><span>${esc(m.text)}</span></span>`;
    }
    function modeChip(mode) {
      const map = {
        peer_to_peer:    "P2P",
        dual_advisor:    "Dual",
        advisor_managed: "Advisor",
      };
      return `<span class="chip mono">${esc(map[mode] || mode || "Advisor")}</span>`;
    }
    function docStatusChip(st) {
      const m = {
        REQUIRED:     { cls: "chip-red",   label: "Required" },
        UPLOADED:     { cls: "chip-blue",  label: "Uploaded" },
        VALIDATED:    { cls: "chip-green", label: "Validated" },
        REJECTED:     { cls: "chip-red",   label: "Rejected" },
        EXPIRED:      { cls: "chip-red",   label: "Expired" },
        NOT_REQUIRED: { cls: "",           label: "N/A" },
      };
      const x = m[st] || { cls: "", label: st };
      return `<span class="chip ${x.cls}"><span class="dot"></span><span>${x.label}</span></span>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       Topbar — clock + chain integrity chip
       ────────────────────────────────────────────────────────────────── */
    function tickClock() {
      const n = new Date();
      const t = n.toUTCString().slice(17, 22) + " UTC";
      document.getElementById("topbar-clock").textContent = t;
    }
    setInterval(tickClock, 1000); tickClock();

    function renderChainChip(chain) {
      const node = document.getElementById("chain-chip");
      const txt  = node.querySelector(".chain-text");
      const dot  = node.querySelector(".dot");
      node.classList.remove("chip-green", "chip-red", "chip-ochre");
      dot.classList.remove("pulse");
      if (!chain) {
        node.classList.add("chip-ochre");
        txt.textContent = "Chain integrity: checking…";
        return;
      }
      if (chain.ok) {
        node.classList.add("chip-green");
        dot.classList.add("pulse");
        const n = chain.attestations_count;
        txt.textContent = "Chain integrity: OK · " + n + " attestation" + (n === 1 ? "" : "s");
      } else if (chain.fetchFailed) {
        node.classList.add("chip-ochre");
        txt.textContent = "Chain integrity: unknown";
      } else {
        node.classList.add("chip-red");
        txt.textContent = "Chain integrity: " + (chain.error || "broken");
      }
    }

    /* ──────────────────────────────────────────────────────────────────
       Connection banner
       ────────────────────────────────────────────────────────────────── */
    function setConn(ok) {
      document.getElementById("conn-banner").classList.toggle("hidden", ok);
    }

    /* ──────────────────────────────────────────────────────────────────
       Demo mode
       ────────────────────────────────────────────────────────────────── */
    function isLocalDemo() { return localStorage.getItem('nomos_demo_mode') === '1'; }
    function applyDemoUi() {
      const on = !!state.demo;
      document.getElementById("demo-banner").classList.toggle("on", on);
      const btn = document.getElementById("demo-btn");
      btn.textContent = on ? "Demo on" : "Demo mode";
      btn.classList.toggle("btn-ochre", on);
      btn.classList.toggle("btn-ghost", !on);
    }
    async function pollDemo() {
      const r = await apiFetch("/api/demo-mode");
      const on = r.ok && r.data && (r.data.demo === true || r.data.enabled === true);
      state.demo = !!on || isLocalDemo();
      applyDemoUi();
    }
    async function toggleDemoMode() {
      const next = !state.demo;
      localStorage.setItem('nomos_demo_mode', next ? '1' : '0');
      state.demo = next;
      applyDemoUi();
      await apiFetch("/api/demo-mode", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ demo: next }),
      });
      toast(next ? "Demo mode on — documents will auto-validate" : "Demo mode off", next ? "warn" : "info");
      await refresh();
    }
    document.getElementById("demo-btn").addEventListener("click", toggleDemoMode);

    /* ──────────────────────────────────────────────────────────────────
       Polling — every 30s
       ────────────────────────────────────────────────────────────────── */
    let inFlight = false;
    async function refresh() {
      if (inFlight) return;
      inFlight = true;
      try {
        const [csR, orcR, healthR, latestR, trigsR, verifyR] = await Promise.all([
          apiFetch("/api/contracts?role=advisor"),
          apiFetch("/api/oracle/latest"),
          apiFetch("/api/v2/oracle/health"),
          apiFetch("/api/v2/oracle/attestations/latest"),
          apiFetch("/api/v2/oracle/triggers?limit=100"),
          apiFetch("/api/v2/oracle/chain/verify"),
        ]);
        if (csR.ok && Array.isArray(csR.data)) state.contracts = csR.data;
        if (orcR.ok && orcR.data) state.oracle = orcR.data;
        state.v2.health   = healthR.ok ? healthR.data : null;
        state.v2.latest   = (latestR.ok || latestR.status === 503) ? latestR.data : null;
        state.v2.triggers = (trigsR.ok && Array.isArray(trigsR.data)) ? trigsR.data : [];
        state.v2.chain    = verifyR.ok && verifyR.data ? verifyR.data : { fetchFailed: true };
        state.loaded = true;
        state.error  = csR.ok ? null : "API unreachable — is the server running on :8000?";
        setConn(csR.ok);
        renderChainChip(state.v2.chain);

        document.getElementById("badge-contracts").textContent = String(state.contracts.length);

        // Refresh detail data for the open contract.
        if (exContract && state.contracts.find(c => c.id === exContract)) {
          const dR = await apiFetch(`/api/contracts/${exContract}?role=advisor`);
          if (dR.ok) state.details[exContract] = dR.data;
        }

        // Eagerly fetch detail summaries for all contracts (used by dashboard
        // action panel and pending-PI counts).
        await Promise.all(state.contracts.map(async x => {
          if (state.details[x.id]) return;
          const r = await apiFetch(`/api/contracts/${x.id}?role=advisor`);
          if (r.ok) state.details[x.id] = r.data;
        }));

        render();
      } finally {
        inFlight = false;
      }
    }
    pollDemo();
    refresh();
    setInterval(refresh, 30_000);

    /* ──────────────────────────────────────────────────────────────────
       Navigation
       ────────────────────────────────────────────────────────────────── */
    function nav(v) {
      view = v;
      exContract = null;
      detailTab = "summary";
      auditClientFilter = "";
      document.querySelectorAll(".side-item").forEach(el => {
        el.classList.toggle("on", el.dataset.view === v);
      });
      render();
    }
    document.querySelectorAll(".side-item").forEach(el => {
      el.addEventListener("click", () => nav(el.dataset.view));
    });

    /* ──────────────────────────────────────────────────────────────────
       Render dispatcher
       ────────────────────────────────────────────────────────────────── */
    function render() {
      const main = document.getElementById("page");
      if (view === "dashboard") return renderDashboard(main);
      if (view === "contracts") return exContract ? renderContractDetail(main) : renderContracts(main);
      if (view === "oracle")    return renderOracle(main);
      if (view === "audit")     return renderAudit(main);
      if (view === "notices")   return renderNotices(main);
      if (view === "library")   return renderLibrary(main);
    }

    /* ──────────────────────────────────────────────────────────────────
       Action items — derived from contracts + details
       ────────────────────────────────────────────────────────────────── */
    function buildActions() {
      const acts = [];
      for (const x of state.contracts) {
        const wf = x.workflow_status || x.status;
        if (x.contract_mode === "dual_advisor" && !x.advisor_b_approved && x.status === "PENDING_SIGNATURE") {
          acts.push({ kind: "approve_advisor_b", contract: x.id, party: x.party_b,
            label: `Approve as advisor B for ${x.party_b}`, sub: `${x.id} · counterparty advisor sign-off required before clients can sign`,
            sev: "ochre", action: "approveB" });
        }
        if (x.contract_mode === "peer_to_peer" && (wf === "PENDING_INITIATOR" || wf === "PENDING_COUNTERPARTY")) {
          // Informational — clients sign directly. Surface but no action.
          acts.push({ kind: "p2p_info", contract: x.id, sev: "blue",
            label: `Direct contract awaiting client signatures`, sub: `${x.id} · ${esc(x.party_a)} ↔ ${esc(x.party_b)} · ${wf.replace(/_/g, " ")}` });
        }
        if (x.status === "PENDING_SIGNATURE" && x.contract_mode !== "peer_to_peer") {
          acts.push({ kind: "pending_sig", contract: x.id, sev: "ochre",
            label: `Awaiting client signature — ${esc(x.party_b)}`,
            sub: `${x.id} · share confirmation PDF for execution`,
            action: "openContract" });
        }
        const det = state.details[x.id];
        if (det) {
          const periods = det.periods || [];
          const pending = periods.find(p => p.payment_instruction_issued && !p.payment_confirmed);
          const nextCalc = periods.find(p => p.fixed_amount === null);
          if (pending) {
            acts.push({ kind: "approve_pi", contract: x.id, period: pending.number,
              label: `Approve payment instruction P${pending.number}`,
              sub: `${x.id} · ${eur(pending.net_amount, 2)} on ${pending.payment_date}`,
              sev: "ochre", action: "approvePi" });
          }
          if (nextCalc && !pending) {
            acts.push({ kind: "execute", contract: x.id, period: nextCalc.number,
              label: `Simulate period P${nextCalc.number}`,
              sub: `${x.id} · reset date ${nextCalc.start}`,
              sev: "blue", action: "simulate" });
          }
          (det.eods || []).forEach(e => {
            acts.push({ kind: "eod", contract: x.id, sev: "red",
              label: `${e.type || "Event of default"} — ${e.party || x.id}`,
              sub: `${x.id} · grace end ${e.grace_end || "—"}`,
              action: "openContract" });
          });
        }
        const rep = x.compliance?.representations;
        if (rep?.breached > 0) {
          acts.push({ kind: "compliance", contract: x.id, sev: "red",
            label: `Representation breached — ${rep.breached} clauses`,
            sub: `${x.id} · review §3 statements`, action: "openContract" });
        }
        if (rep?.pending_review > 0) {
          acts.push({ kind: "docs_overdue", contract: x.id, sev: "ochre",
            label: `${rep.pending_review} documents overdue`,
            sub: `${x.id} · counterparty has not delivered §4(a) obligations`,
            action: "openContract" });
        }
      }
      // Surface live oracle triggers as actions too.
      for (const t of (state.v2.triggers || [])) {
        if (t.severity !== "trigger") continue;
        const lbl = RULE_LABELS[t.rule_id] || t.rule_id;
        acts.push({ kind: "oracle_trigger", contract: t.contract_id, sev: "red",
          label: `${lbl} on ${t.contract_id}`,
          sub: `Oracle attested · ${formatRelative(t.evaluated_at)}`,
          action: "openContract" });
      }
      return acts;
    }

    function actionsHtml(acts) {
      if (!acts.length) {
        return `<div class="muted" style="font-size:13px;padding:8px 0;">No action required. All clear.</div>`;
      }
      return acts.map(a => {
        let buttons = "";
        if (a.action === "approvePi")  buttons = `<button class="btn btn-ochre btn-sm" data-act="approvePi" data-cid="${esc(a.contract)}" data-period="${a.period}" type="button">Approve PI</button>`;
        else if (a.action === "simulate")  buttons = `<button class="btn btn-sm" data-act="simulate" data-cid="${esc(a.contract)}" type="button">Simulate P${a.period}</button>`;
        else if (a.action === "approveB")  buttons = `<button class="btn btn-ochre btn-sm" data-act="approveB" data-cid="${esc(a.contract)}" type="button">Approve as advisor B</button>`;
        if (a.contract) buttons += `<button class="btn btn-ghost btn-sm" data-act="openContract" data-cid="${esc(a.contract)}" type="button">Open</button>`;
        const sevCls = { ochre: "chip-ochre", red: "chip-red", blue: "chip-blue", green: "chip-green" }[a.sev] || "";
        return `<div class="action-row">
          <span class="chip ${sevCls}"><span class="dot"></span><span>${a.sev === "red" ? "Critical" : a.sev === "ochre" ? "Action" : "Info"}</span></span>
          <div class="a-meta">
            <div class="a-title">${esc(a.label)}</div>
            <div class="a-sub">${esc(a.sub)}</div>
          </div>
          <div class="a-actions">${buttons}</div>
        </div>`;
      }).join("");
    }

    /* ──────────────────────────────────────────────────────────────────
       View 1 — Dashboard
       ────────────────────────────────────────────────────────────────── */
    function renderDashboard(main) {
      const acts = buildActions();
      const D = state.contracts;
      const totalNotional = D.reduce((s, x) => s + Number(x.notional || 0), 0);
      const trigsLast24 = (state.v2.triggers || []).filter(t => {
        if (t.severity !== "trigger") return false;
        const ts = new Date(t.evaluated_at).getTime();
        return Date.now() - ts < 86400000;
      }).length;
      const chainOk = state.v2.chain?.ok === true;
      const chainCls = chainOk ? "ok" : "bad";
      const chainTxt = chainOk ? "OK" : (state.v2.chain?.fetchFailed ? "—" : "BROKEN");
      const mdHtml = renderMarketTile();
      const trigsActive = (state.v2.triggers || []).filter(t => t.severity === "trigger" || t.severity === "potential_trigger");
      const trigsHtml = renderTriggersTable(trigsActive);
      const recentAuditHtml = renderRecentAudit();

      const actionsBlock = acts.length === 0 ? "" : `
        <section class="card fade-up">
          <div class="section-h" style="margin-bottom:10px;">
            <span class="section-num">01</span>
            <h2 class="section-title">Action required</h2>
            <span class="section-sub">${acts.length} item${acts.length === 1 ? "" : "s"}</span>
          </div>
          ${actionsHtml(acts)}
        </section>`;

      main.innerHTML = `
        <section class="page-h fade-up">
          <div>
            <div class="num">01 · Dashboard</div>
            <h1>Dashboard</h1>
            <p class="lede">Your portfolio at a glance, Linklaters LLP.</p>
          </div>
        </section>

        <div class="stack">
          ${actionsBlock}

          <section class="kpi-row fade-up" aria-label="Portfolio summary">
            <div class="kpi"><div class="kpi-label">Active contracts</div><div class="kpi-value">${D.length}</div><div class="kpi-foot">${D.filter(x => x.status === "ACTIVE").length} active · ${D.filter(x => x.status !== "ACTIVE").length} other</div></div>
            <div class="kpi"><div class="kpi-label">Total notional</div><div class="kpi-value">${eurM(totalNotional)}</div><div class="kpi-foot">EUR equivalent</div></div>
            <div class="kpi"><div class="kpi-label">Triggers (24h)</div><div class="kpi-value ${trigsLast24 ? "warn" : ""}">${trigsLast24}</div><div class="kpi-foot">From the oracle</div></div>
            <div class="kpi"><div class="kpi-label">Chain integrity</div><div class="kpi-value ${chainCls}">${chainTxt}</div><div class="kpi-foot">Audit-trail attestations</div></div>
          </section>

          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">02</span>
              <h2 class="section-title">Active triggers</h2>
              <span class="section-sub">${trigsActive.length} active</span>
            </div>
            ${trigsHtml}
          </section>

          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">03</span>
              <h2 class="section-title">Market data</h2>
            </div>
            ${mdHtml}
          </section>

          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">04</span>
              <h2 class="section-title">Recent activity</h2>
              <span class="section-sub">Last 10 events</span>
            </div>
            ${recentAuditHtml}
          </section>
        </div>
      `;
      bindActionButtons(main);
      // Recent activity is loaded async.
      loadRecentAudit();
    }

    function renderMarketTile() {
      const env = state.v2.latest;
      const chainOk = state.v2.chain?.ok;
      let chainHtml = "";
      if (chainOk === true)       chainHtml = `<span class="chip chip-green"><span class="dot"></span><span>Audit trail verified</span></span>`;
      else if (chainOk === false) chainHtml = `<span class="chip chip-red"><span class="dot"></span><span>Audit trail mismatch</span></span>`;
      else                        chainHtml = `<span class="chip chip-ochre"><span class="dot"></span><span>Audit trail: checking…</span></span>`;
      if (!env || !env.attestation || !Array.isArray(env.datapoints) || env.datapoints.length === 0) {
        return `<div class="empty-state">
          <div class="empty-state-title">Market data unavailable</div>
          <div class="empty-state-body">The oracle has not yet published a verified rate.</div>
        </div>`;
      }
      const estr = env.datapoints.find(d => d.metric === "ESTR") || env.datapoints[0];
      const valTxt = estr.unit === "decimal_fraction"
        ? formatDecimalRate(estr.value)
        : Number(estr.value).toFixed(3) + "%";
      return `
        <div style="display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;">
          <div class="dp-tile">
            <div class="muted" style="font-size:12px;">Euro short-term rate <span class="jargon">${esc(estr.metric)}</span></div>
            <div class="dp-value">${esc(valTxt)}</div>
            <div style="font-size:12px;color:var(--ink-2);">European Central Bank <span class="jargon">ECB SDW</span></div>
            <div class="timestamp" style="margin-top:4px;">As of ${esc(formatRelative(estr.as_of + "T00:00:00Z"))} · ${esc(estr.as_of)}</div>
          </div>
          <div>${chainHtml}</div>
        </div>`;
    }

    function renderTriggersTable(trigs) {
      if (!trigs.length) {
        return `<div class="empty-state">
          <div class="empty-state-title">No active triggers</div>
          <div class="empty-state-body">All monitored conditions are nominal.</div>
        </div>`;
      }
      return `<table class="table"><thead><tr>
          <th>Severity</th><th>Rule</th><th>Clause</th><th>Contract</th><th>When</th>
        </tr></thead><tbody>${trigs.map(ev => {
          const sev = SEVERITY_CHIPS[ev.severity] || { cls: "", label: ev.severity };
          const lbl = RULE_LABELS[ev.rule_id] || ev.rule_id;
          return `<tr>
            <td><span class="chip ${sev.cls}"><span class="dot"></span><span>${esc(sev.label)}</span></span></td>
            <td><span class="strong">${esc(lbl)}</span> <span class="jargon">${esc(ev.rule_id)}</span></td>
            <td><span class="jargon">${esc(ev.clause_ref)}</span></td>
            <td><span class="id-cell" data-act="openContract" data-cid="${esc(ev.contract_id)}">${esc(ev.contract_id)}</span></td>
            <td><span class="timestamp" title="${esc(formatTimestamp(ev.evaluated_at))}">${esc(formatRelative(ev.evaluated_at))}</span></td>
          </tr>`;
        }).join("")}</tbody></table>`;
    }

    async function loadRecentAudit() {
      const slot = document.getElementById("recent-audit-slot");
      if (!slot) return;
      const r = await apiFetch("/api/audit");
      if (!r.ok || !r.data) {
        slot.innerHTML = `<div class="muted" style="font-size:12.5px;">Could not load audit feed.</div>`;
        return;
      }
      const entries = (r.data.entries || []).slice(-10).reverse();
      state.auditGlobal = r.data.entries || [];
      slot.innerHTML = renderAuditList(entries);
    }
    function renderRecentAudit() {
      return `<div id="recent-audit-slot"><div class="muted" style="font-size:12.5px;">Loading…</div></div>`;
    }
    function renderAuditList(entries) {
      if (!entries.length) {
        return `<div class="muted" style="font-size:12.5px;">No audit entries yet.</div>`;
      }
      return `<table class="table"><thead><tr><th>Timestamp</th><th>Contract</th><th>Event</th><th>Actor</th><th>Summary</th></tr></thead><tbody>${entries.map(l => `<tr>
        <td><span class="timestamp">${esc((l.timestamp || "").slice(0, 19).replace("T", " "))}</span></td>
        <td>${l.contract_id ? `<span class="id-cell" data-act="openContract" data-cid="${esc(l.contract_id)}">${esc(l.contract_id)}</span>` : "—"}</td>
        <td><span class="chip mono">${esc((l.event_type || "").replace(/_/g, " "))}</span></td>
        <td class="muted" style="font-size:12px;">${esc(l.actor || "engine")}</td>
        <td class="muted" style="font-size:12px;">${esc(JSON.stringify(l.data || {}).slice(0, 90))}</td>
      </tr>`).join("")}</tbody></table>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       View 2 — Contracts (table + detail)
       ────────────────────────────────────────────────────────────────── */
    function renderContracts(main) {
      const D = filteredSortedContracts();
      const body = state.contracts.length === 0
        ? `<div class="empty-state">
             <div class="empty-state-title">No contracts yet</div>
             <div class="empty-state-body">Use “New contract” to draft the first one.</div>
           </div>`
        : `<table class="table"><thead><tr>
             <th>ID</th><th>Counterparty</th><th>Notional</th>
             <th>Status</th><th>Mode</th><th>Next action</th>
           </tr></thead><tbody>${D.map(x => `<tr class="contract-row" data-cid="${esc(x.id)}">
               <td><span class="id-cell">${esc(x.id)}</span></td>
               <td>${esc(x.party_b)}</td>
               <td class="mono">${eur(x.notional)} ${esc(x.currency || "EUR")}</td>
               <td>${statusChip(x.workflow_status || x.status)}</td>
               <td>${modeChip(x.contract_mode)}</td>
               <td class="muted" style="font-size:12.5px;">${esc(nextActionFor(x))}</td>
             </tr>`).join("")}</tbody></table>`;

      main.innerHTML = `
        <section class="page-h fade-up">
          <div>
            <div class="num">01 · Contracts</div>
            <h1>Contracts</h1>
            <p class="lede">All active and past contracts under your advisory.</p>
          </div>
          <div class="aside">
            <button id="btn-new-contract" class="btn btn-ochre" type="button">New contract</button>
          </div>
        </section>
        <div class="toolbar">
          <input id="ct-search" class="input" placeholder="Search by ID, party, status…" value="${esc(ctQuery)}" />
          <select id="ct-sort" class="input">
            <option value="status" ${ctSort === "status" ? "selected" : ""}>Sort by status</option>
            <option value="notional" ${ctSort === "notional" ? "selected" : ""}>Sort by notional</option>
            <option value="cp" ${ctSort === "cp" ? "selected" : ""}>Sort by counterparty</option>
            <option value="effective" ${ctSort === "effective" ? "selected" : ""}>Sort by effective date</option>
          </select>
          <span class="muted" style="font-size:12px;">${D.length} of ${state.contracts.length}</span>
        </div>
        <section class="card fade-up">${body}</section>
      `;
      document.getElementById("btn-new-contract").addEventListener("click", openNewContract);
      const search = document.getElementById("ct-search");
      let dt; search.addEventListener("input", e => {
        clearTimeout(dt); dt = setTimeout(() => { ctQuery = e.target.value; render(); }, 180);
      });
      document.getElementById("ct-sort").addEventListener("change", e => { ctSort = e.target.value; render(); });
      main.querySelectorAll(".contract-row").forEach(tr => {
        tr.addEventListener("click", () => openContract(tr.dataset.cid));
      });
    }
    function nextActionFor(x) {
      const wf = x.workflow_status || x.status;
      if (x.contract_mode === "dual_advisor" && !x.advisor_b_approved) return "Approve as advisor B";
      if (wf === "PENDING_INITIATOR")    return "Awaiting creator signature";
      if (wf === "PENDING_COUNTERPARTY") return "Awaiting counterparty signature";
      if (wf === "PENDING_SIGNATURE")    return "Awaiting client signature";
      const det = state.details[x.id];
      if (det) {
        const pending = (det.periods || []).find(p => p.payment_instruction_issued && !p.payment_confirmed);
        if (pending) return `Approve PI P${pending.number}`;
        const next = (det.periods || []).find(p => p.fixed_amount === null);
        if (next)    return `Execute P${next.number}`;
      }
      return "—";
    }
    function filteredSortedContracts() {
      let D = [...state.contracts];
      const q = ctQuery.trim().toLowerCase();
      if (q) D = D.filter(x =>
        (x.id || "").toLowerCase().includes(q) ||
        (x.party_a || "").toLowerCase().includes(q) ||
        (x.party_b || "").toLowerCase().includes(q) ||
        (x.status || "").toLowerCase().includes(q)
      );
      const cmp = {
        status:    (a, b) => (a.status || "").localeCompare(b.status || ""),
        notional:  (a, b) => Number(b.notional || 0) - Number(a.notional || 0),
        cp:        (a, b) => (a.party_b || "").localeCompare(b.party_b || ""),
        effective: (a, b) => (a.effective_date || "").localeCompare(b.effective_date || ""),
      }[ctSort];
      if (cmp) D.sort(cmp);
      return D;
    }

    async function openContract(id) {
      view = "contracts";
      exContract = id;
      detailTab = "summary";
      document.querySelectorAll(".side-item").forEach(el => {
        el.classList.toggle("on", el.dataset.view === "contracts");
      });
      const tasks = [];
      if (!state.details[id])  tasks.push(apiFetch(`/api/contracts/${id}?role=advisor`).then(r => { if (r.ok) state.details[id] = r.data; }));
      if (!state.dd[id])       tasks.push(apiFetch(`/api/contracts/${id}/due-diligence`).then(r => { if (r.ok) state.dd[id] = r.data; }));
      if (!state.comments[id]) tasks.push(apiFetch(`/api/contracts/${id}/comments`).then(r => { if (r.ok) state.comments[id] = r.data; }));
      if (!state.audit[id])    tasks.push(apiFetch(`/api/contracts/${id}/audit`).then(r => { if (r.ok) state.audit[id] = r.data; }));
      render();
      await Promise.all(tasks);
      render();
    }

    function renderContractDetail(main) {
      const id = exContract;
      const x = state.contracts.find(c => c.id === id);
      if (!x) {
        main.innerHTML = `<button class="detail-back" id="back-btn" type="button">← Back</button>
          <section class="page-h"><div><div class="num">Contract</div><h1>Not found</h1></div></section>`;
        document.getElementById("back-btn").addEventListener("click", () => { exContract = null; render(); });
        return;
      }
      const det = state.details[id];

      const tabs = [
        { v: "summary",   l: "Summary" },
        { v: "schedule",  l: "Schedule & payments" },
        { v: "diligence", l: "Diligence" },
        { v: "audit",     l: "Audit" },
      ];
      const tabsHtml = tabs.map(t =>
        `<button class="tab ${t.v === detailTab ? "on" : ""}" data-tab="${t.v}" type="button">${t.l}</button>`
      ).join("");

      let bodyHtml;
      if (!det) bodyHtml = `<div class="empty-state"><div class="empty-state-title">Loading</div><div class="empty-state-body">Fetching contract detail.</div></div>`;
      else if (detailTab === "summary")    bodyHtml = detailSummary(x, det);
      else if (detailTab === "schedule")   bodyHtml = detailSchedule(x, det);
      else if (detailTab === "diligence")  bodyHtml = detailDiligence(x, det);
      else if (detailTab === "audit")      bodyHtml = detailAudit(x);

      const advisorBBtn = (x.contract_mode === "dual_advisor" && !x.advisor_b_approved && x.status === "PENDING_SIGNATURE")
        ? `<button class="btn btn-ochre btn-sm" data-act="approveB" data-cid="${esc(id)}" type="button">Approve as advisor B</button>` : "";

      main.innerHTML = `
        <button class="detail-back" id="back-btn" type="button">← Contracts › ${esc(id)}</button>
        <section class="page-h fade-up">
          <div>
            <div class="num">Contract · ${esc(id)}</div>
            <h1 style="font-size:40px;">${esc(x.party_b)}</h1>
            <p class="lede">Interest rate swap · ${eur(x.notional)} ${esc(x.currency || "EUR")} · ${esc(x.effective_date)} → ${esc(x.termination_date)}</p>
          </div>
          <div class="aside">
            ${statusChip(x.workflow_status || x.status)}
            ${modeChip(x.contract_mode)}
            ${advisorBBtn}
          </div>
        </section>
        <div class="tabs">${tabsHtml}</div>
        <div id="detail-body">${bodyHtml}</div>
      `;
      document.getElementById("back-btn").addEventListener("click", () => { exContract = null; render(); });
      main.querySelectorAll(".tab").forEach(b => {
        b.addEventListener("click", () => { detailTab = b.dataset.tab; render(); });
      });
      bindActionButtons(main);
      bindDiligenceForm(main, id);
      bindCommentForm(main, id);
    }

    function detailSummary(x, det) {
      const env = state.v2.latest;
      const estr = env?.datapoints?.find(d => d.metric === "ESTR");
      const rateTxt = estr ? formatDecimalRate(estr.value) : (state.oracle?.current_rate ? pct(state.oracle.current_rate) : "—");
      const seq = env?.attestation?.sequence_number;
      const periods = det.periods || [];
      const pendingPI = periods.find(p => p.payment_instruction_issued && !p.payment_confirmed);
      const nextCalc = periods.find(p => p.fixed_amount === null);
      const completedCount = periods.filter(p => p.payment_confirmed).length;

      const pendingPIBlock = pendingPI ? `
          <section class="card">
            <div class="section-h" style="margin-bottom:10px;">
              <span class="section-num">C</span>
              <h2 class="section-title">Payment instruction pending approval</h2>
              <span class="section-sub">P${pendingPI.number}</span>
            </div>
            <dl class="kv">
              <dt>Period</dt><dd class="mono">P${pendingPI.number}</dd>
              <dt>Pay date</dt><dd class="mono">${esc(pendingPI.payment_date)}</dd>
              <dt>Net amount</dt><dd class="mono"><span class="strong">${eur(pendingPI.net_amount, 2)}</span></dd>
              <dt>Net payer</dt><dd>${esc(pendingPI.net_payer || "—")}</dd>
              <dt>Floating reset</dt><dd class="mono muted">${pendingPI.oracle_rate != null ? pct(pendingPI.oracle_rate) : "—"}</dd>
            </dl>
            <div style="margin-top:14px;display:flex;gap:8px;">
              <button class="btn btn-ochre btn-sm" data-act="approvePi" data-cid="${esc(x.id)}" data-period="${pendingPI.number}" type="button">Approve PI</button>
            </div>
          </section>` : "";

      const nextExecBlock = (!pendingPI && nextCalc) ? `
          <section class="card">
            <div class="section-h" style="margin-bottom:10px;">
              <span class="section-num">D</span>
              <h2 class="section-title">Next period</h2>
              <span class="section-sub">P${nextCalc.number} · reset ${esc(nextCalc.start)}</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <button class="btn btn-sm" data-act="simulate" data-cid="${esc(x.id)}" type="button">Simulate P${nextCalc.number}</button>
              <span class="muted" style="font-size:12px;">Pulls a fresh oracle rate and computes the period.</span>
            </div>
          </section>` : "";

      const noticeBlock = `
          <section class="card">
            <div class="section-h" style="margin-bottom:10px;">
              <span class="section-num">E</span>
              <h2 class="section-title">Generate notice</h2>
              <span class="section-sub">§12 ISDA 2002</span>
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
              <select id="det-notice-type" class="input" style="width:280px;">
                ${NOTICE_TYPES.map(n => `<option value="${n.v}">${esc(n.l)} (${esc(n.j)})</option>`).join("")}
              </select>
              <button class="btn btn-sm" id="det-notice-btn" type="button">Generate notice</button>
            </div>
          </section>`;

      return `
        <div class="stack">
          <section class="card">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">A</span>
              <h2 class="section-title">Counterparty &amp; terms</h2>
            </div>
            <dl class="kv">
              <dt>Client</dt><dd>${esc(x.party_a)}</dd>
              <dt>Counterparty</dt><dd>${esc(x.party_b)}</dd>
              <dt>Notional</dt><dd>${eur(x.notional)} ${esc(x.currency || "EUR")}</dd>
              <dt>Fixed leg</dt><dd>${pct(x.fixed_rate)}</dd>
              <dt>Floating leg</dt><dd>${esc(x.floating_index || "EURIBOR 3M")}</dd>
              <dt>Effective</dt><dd class="mono">${esc(x.effective_date)}</dd>
              <dt>Termination</dt><dd class="mono">${esc(x.termination_date)}</dd>
              <dt>Governing law</dt><dd>${esc(x.governing_law || "English law")} <span class="jargon">§13 ISDA 2002</span></dd>
              <dt>Mode</dt><dd>${modeChip(x.contract_mode)}</dd>
              <dt>Periods</dt><dd>${completedCount} of ${periods.length} approved</dd>
            </dl>
          </section>

          <section class="card">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">B</span>
              <h2 class="section-title">Oracle reference</h2>
              <span class="section-sub">Used to compute the floating leg</span>
            </div>
            <div class="dp-tile" style="max-width:520px;">
              <div class="muted" style="font-size:12px;">Euro short-term rate <span class="jargon">ESTR</span></div>
              <div class="dp-value">${esc(rateTxt)}</div>
              <div style="font-size:12px;color:var(--ink-2);">European Central Bank <span class="jargon">ECB SDW</span></div>
              <div class="timestamp" style="margin-top:4px;">
                ${seq != null ? "Attestation #" + String(seq).padStart(3, "0") : "Awaiting first attestation"}
                · <a href="/oracle" data-act="openOracle" style="color:var(--ochre);text-decoration:underline;text-underline-offset:2px;">Open oracle</a>
              </div>
            </div>
          </section>

          ${pendingPIBlock}
          ${nextExecBlock}
          ${noticeBlock}
        </div>`;
    }

    function detailSchedule(x, det) {
      const periods = det.periods || [];
      if (periods.length === 0) {
        return `<section class="card"><div class="empty-state">
          <div class="empty-state-title">No payment periods</div>
          <div class="empty-state-body">Once the contract is signed, the schedule will appear here.</div>
        </div></section>`;
      }
      const rows = periods.map(p => {
        const st = p.payment_confirmed ? `<span class="chip chip-green"><span class="dot"></span><span>Confirmed</span></span>`
          : p.payment_instruction_issued ? `<span class="chip chip-ochre"><span class="dot"></span><span>PI pending</span></span>`
          : p.fixed_amount !== null ? `<span class="chip chip-blue"><span class="dot"></span><span>Calculated</span></span>`
          : `<span class="chip"><span class="dot"></span><span>Scheduled</span></span>`;
        return `<tr>
          <td class="mono">P${p.number}</td>
          <td class="mono">${esc(p.payment_date)}</td>
          <td class="mono">${eur(p.fixed_amount, 2)}</td>
          <td class="mono">${eur(p.floating_amount, 2)}</td>
          <td class="mono"><span class="strong">${eur(p.net_amount, 2)}</span></td>
          <td class="muted" style="font-size:12px;">${esc(p.net_payer || "—")}</td>
          <td class="mono muted">${p.oracle_rate != null ? pct(p.oracle_rate) : "—"}</td>
          <td>${st}</td>
        </tr>`;
      }).join("");
      const pending = periods.find(p => p.payment_instruction_issued && !p.payment_confirmed);
      const next = periods.find(p => p.fixed_amount === null);
      const actionBar = (pending || next) ? `
        <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
          ${pending ? `<button class="btn btn-ochre btn-sm" data-act="approvePi" data-cid="${esc(x.id)}" data-period="${pending.number}" type="button">Approve PI P${pending.number}</button>` : ""}
          ${(!pending && next) ? `<button class="btn btn-sm" data-act="simulate" data-cid="${esc(x.id)}" type="button">Simulate P${next.number}</button>` : ""}
          ${(pending && next) ? `<span class="muted" style="font-size:12px;align-self:center;">Approve P${pending.number} before P${next.number} can be executed.</span>` : ""}
        </div>` : "";
      return `<section class="card">
        <table class="table"><thead><tr>
          <th>#</th><th>Pay date</th><th>Fixed</th><th>Floating</th>
          <th>Net</th><th>Payer</th><th>Floating reset</th><th>Status</th>
        </tr></thead><tbody>${rows}</tbody></table>
        ${actionBar}
      </section>`;
    }

    function detailDiligence(x, det) {
      const dd = state.dd[x.id] || {};
      const cmt = state.comments[x.id] || { comments: [], open_count: 0 };
      const docs = dd.documents || [];
      const preDocs  = docs.filter(d => d.is_pre_signing);
      const postDocs = docs.filter(d => !d.is_pre_signing);
      const tiers = dd.document_tiers || {};
      const genA = tiers.general_party_a || [];
      const genB = tiers.general_party_b || [];

      function docTable(list, caption) {
        if (!list.length) return "";
        const rows = list.map(d => `<tr>
          <td>${esc(d.description || d.doc_type)}${d.linked_obligation ? `<div class="muted" style="font-size:11px;">${esc(d.linked_obligation)}</div>` : ""}</td>
          <td>${docStatusChip(d.status)}</td>
          <td class="mono muted">${esc(d.due_date_obligation || "—")}</td>
          <td>${d.status === "UPLOADED"
            ? `<div style="display:flex;gap:6px;"><button class="btn btn-ochre btn-sm" data-act="ddAccept" data-cid="${esc(x.id)}" data-doc="${esc(d.doc_id)}" data-entity="${esc(d.entity_name || "")}" type="button">Accept</button><button class="btn btn-sm" data-act="ddReject" data-cid="${esc(x.id)}" data-doc="${esc(d.doc_id)}" data-entity="${esc(d.entity_name || "")}" type="button">Reject</button></div>`
            : ""}</td>
        </tr>`).join("");
        return `<div class="field-label" style="margin-top:14px;">${esc(caption)}</div>
          <table class="table"><thead><tr><th>Document</th><th>Status</th><th>Due</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
      }

      const ragChip = dd.rag_status === "GREEN" ? `<span class="chip chip-green"><span class="dot"></span><span>Green</span></span>`
        : dd.rag_status === "AMBER" ? `<span class="chip chip-ochre"><span class="dot"></span><span>Amber</span></span>`
        : dd.rag_status === "RED" ? `<span class="chip chip-red"><span class="dot"></span><span>Red</span></span>`
        : `<span class="chip"><span class="dot"></span><span>${esc(dd.rag_status || "—")}</span></span>`;

      const ddBlock = `<section class="card">
        <div class="section-h" style="margin-bottom:14px;">
          <span class="section-num">A</span>
          <h2 class="section-title">Diligence checklist</h2>
          <span class="section-sub">${ragChip}</span>
        </div>
        ${(genA.length || genB.length) ? `${docTable(genA, "Entity documents · " + (x.party_a || "Party A"))}${docTable(genB, "Entity documents · " + (x.party_b || "Party B"))}` : ""}
        ${docTable(preDocs, "Pre-signing")}
        ${docTable(postDocs, "Post-signing (ongoing)")}
        ${docs.length === 0 && !genA.length && !genB.length ? `<div class="empty-state"><div class="empty-state-title">No documents listed</div><div class="empty-state-body">Diligence checklist not yet attached.</div></div>` : ""}
      </section>`;

      const cmtsHtml = cmt.comments?.length
        ? cmt.comments.map(c => `<div class="cmt ${c.status === "OPEN" ? "cmt-open" : "cmt-resolved"}">
            <div class="cmt-meta">
              <span>${esc(c.author)}</span>
              <span>${esc((c.timestamp || "").slice(0, 16).replace("T", " "))} UTC</span>
              <span class="chip ${c.status === "OPEN" ? "chip-ochre" : "chip-green"}"><span class="dot"></span><span>${esc(c.status)}</span></span>
              ${c.status === "OPEN" ? `<button class="btn btn-sm btn-ghost" data-act="resolveCmt" data-cid="${esc(x.id)}" data-cmt="${esc(c.comment_id)}" type="button">Resolve</button>` : ""}
            </div>
            <div class="cmt-text">${esc(c.text)}</div>
          </div>`).join("")
        : `<div class="muted" style="font-size:13px;">No comments yet.</div>`;

      const cmtBlock = `<section class="card">
        <div class="section-h" style="margin-bottom:14px;">
          <span class="section-num">B</span>
          <h2 class="section-title">Comments</h2>
          <span class="section-sub">${cmt.open_count || 0} open</span>
        </div>
        <div>${cmtsHtml}</div>
        <div style="margin-top:12px;border-top:1px dashed var(--hair);padding-top:12px;">
          <textarea id="adv-cmt-text" class="input" placeholder="Add a comment for the client…"></textarea>
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
            <button class="btn btn-ochre btn-sm" id="adv-cmt-submit" type="button">Submit comment</button>
            <span id="adv-cmt-msg" class="muted" style="font-size:12px;"></span>
          </div>
        </div>
      </section>`;

      return `<div class="stack">${ddBlock}${cmtBlock}</div>`;
    }

    function detailAudit(x) {
      const list = state.audit[x.id];
      if (!list) {
        return `<div class="empty-state"><div class="empty-state-title">Loading</div><div class="empty-state-body">Fetching audit entries.</div></div>`;
      }
      const entries = Array.isArray(list) ? [...list].reverse() : [];
      if (!entries.length) {
        return `<div class="empty-state"><div class="empty-state-title">No audit entries</div><div class="empty-state-body">Activity for this contract will appear here.</div></div>`;
      }
      return `<section class="card">${renderAuditList(entries)}</section>`;
    }

        confirmAndGenerateNotice(id, t);
      });
      const submit = main.querySelector("#adv-cmt-submit");
      if (submit) submit.addEventListener("click", () => submitAdvisorComment(id));
      const resolves = main.querySelectorAll('[data-act="resolveCmt"]');
      resolves.forEach(b => b.addEventListener("click", () => resolveCmt(b.dataset.cid, b.dataset.cmt)));
    }
    function bindDiligenceForm(main, id) {
      main.querySelectorAll('[data-act="ddAccept"]').forEach(b =>
        b.addEventListener("click", () => validateDoc(b.dataset.cid, b.dataset.doc, b.dataset.entity, true)));

        b.addEventListener("click", () => validateDoc(b.dataset.cid, b.dataset.doc, b.dataset.entity, false)));

    /* ──────────────────────────────────────────────────────────────────
       View 3 — Audit
       ────────────────────────────────────────────────────────────────── */
    async function renderAudit(main) {
      const allParties = new Set();
      state.contracts.forEach(x => { if (x.party_a) allParties.add(x.party_a); if (x.party_b) allParties.add(x.party_b); });
      const partyOpts = ["", ...[...allParties].sort()].map(p => `<option value="${esc(p)}" ${auditClientFilter === p ? "selected" : ""}>${p ? esc(p) : "All counterparties"}</option>`).join("");

      const chain = state.v2.chain;
      const chainTxt = chain?.ok ? `OK · ${chain.attestations_count} attestation${chain.attestations_count === 1 ? "" : "s"}`
        : chain?.fetchFailed ? "Unknown" : (chain?.error || "Broken");
      const chainCls = chain?.ok ? "chip-green" : chain?.fetchFailed ? "chip-ochre" : "chip-red";

      main.innerHTML = `
        <section class="page-h fade-up">
          <div>
            <div class="num">01 · Audit</div>
            <h1>Audit trail</h1>
            <p class="lede">Cryptographically chained record of all contract actions and oracle attestations.</p>
          </div>
        </section>
        <div class="stack">
          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">01</span>
              <h2 class="section-title">Chain integrity</h2>
            </div>
            <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
              <span class="chip ${chainCls}"><span class="dot"></span><span>${esc(chainTxt)}</span></span>
              <span class="muted" style="font-size:12px;">Audit-trail attestations are signed and chained. A red chip means the chain failed verification.</span>
            </div>
          </section>

          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">02</span>
              <h2 class="section-title">Entries</h2>
            </div>
            <div class="toolbar">
              <select id="aud-client" class="input">${partyOpts}</select>
              <input id="aud-from" type="date" class="input" style="width:170px;" />
              <input id="aud-to"   type="date" class="input" style="width:170px;" />
              <input id="aud-search" class="input" placeholder="Search…" style="flex:1;" />
            </div>
            <div id="aud-list"><div class="muted" style="font-size:12.5px;">Loading…</div></div>
          </section>
        </div>
      `;
      const clientSel = document.getElementById("aud-client");
      clientSel.addEventListener("change", e => { auditClientFilter = e.target.value; loadAuditEntries(); });
      ["aud-from", "aud-to", "aud-search"].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener("input", () => loadAuditEntries());
        el.addEventListener("change", () => loadAuditEntries());
      });
      loadAuditEntries();
    }
    async function loadAuditEntries() {
      const slot = document.getElementById("aud-list");
      if (!slot) return;
      const path = auditClientFilter
        ? `/api/audit?client=${encodeURIComponent(auditClientFilter)}`
        : `/api/audit`;
      const r = await apiFetch(path);
      if (!r.ok || !r.data) { slot.innerHTML = `<div class="muted" style="font-size:12.5px;">Could not load entries.</div>`; return; }
      let entries = r.data.entries || [];
      const qFrom = document.getElementById("aud-from")?.value || "";
      const qTo   = document.getElementById("aud-to")?.value   || "";
      const qSearch = (document.getElementById("aud-search")?.value || "").toLowerCase();
      if (qFrom) entries = entries.filter(e => (e.timestamp || "").slice(0, 10) >= qFrom);
      if (qTo)   entries = entries.filter(e => (e.timestamp || "").slice(0, 10) <= qTo);
      if (qSearch) entries = entries.filter(e => {
        const s = (e.event_type || "") + " " + (e.actor || "") + " " + (e.contract_id || "") + " " + JSON.stringify(e.data || {});
        return s.toLowerCase().includes(qSearch);
      });
      entries = [...entries].reverse();
      slot.innerHTML = renderAuditList(entries);
      slot.querySelectorAll('[data-act="openContract"]').forEach(el =>
        el.addEventListener("click", () => openContract(el.dataset.cid)));
    }

              </div>
              <button id="not-gen" class="btn btn-ochre" type="button">Generate</button>
            </div>
          </section>

          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">02</span>

    /* ──────────────────────────────────────────────────────────────────
       View 5 — Library
       ────────────────────────────────────────────────────────────────── */
    function renderLibrary(main) {
      // Build per-jurisdiction summary from contracts (best-effort).
      const byJuris = {};
      for (const x of state.contracts) {
        const det = state.details[x.id];
        const jA = det?.party_a?.jurisdiction || "—";
        const jB = det?.party_b?.jurisdiction || "—";
        const key = jA + " · " + jB;
        if (!byJuris[key]) byJuris[key] = { jA, jB, count: 0, status: x.netting_status || "NOT_ASSESSED" };
        byJuris[key].count += 1;
      }
      const opinionEntries = Object.entries(byJuris);
      const opinionsHtml = opinionEntries.length === 0
        ? `<div class="muted" style="font-size:13px;">No netting opinions to display yet. Opinions appear once contracts are loaded.</div>`
        : `<table class="table"><thead><tr><th>Party A jurisdiction</th><th>Party B jurisdiction</th><th>Status</th><th>Contracts</th></tr></thead><tbody>${opinionEntries.map(([_, r]) => {
          const cls = r.status === "GREEN" ? "chip-green" : r.status === "AMBER" ? "chip-ochre" : r.status === "RED" ? "chip-red" : "";
          return `<tr>
            <td>${esc(r.jA)}</td><td>${esc(r.jB)}</td>
            <td><span class="chip ${cls}"><span class="dot"></span><span>${esc(r.status)}</span></span></td>

        <tr><td>France <span class="jargon">FR</span></td><td><span class="chip chip-green"><span class="dot"></span><span>Enforceable</span></span></td><td class="muted" style="font-size:12px;">Gide Loyrette Nouel · Code monétaire et financier</td></tr>
      </tbody></table>`;

      main.innerHTML = `

            <p class="lede">Netting opinions, clause templates, and regulatory references.</p>

      bindActionButtons(main);
