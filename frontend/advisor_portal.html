    /* ──────────────────────────────────────────────────────────────────
       Oracle — internal view (mirrors /oracle inside the portal shell)
       ────────────────────────────────────────────────────────────────── */
    function renderOracle(main) {
      const env = state.v2.latest, chain = state.v2.chain, h = state.v2.health;
      const trigs = (state.v2.triggers || []).slice(0, 10);
      let chainHtml;
      if (chain?.ok) {
        const n = chain.attestations_count || 0;
        chainHtml = `<span class="chip chip-green"><span class="dot"></span><span>Chain integrity: OK · ${n} attestation${n === 1 ? "" : "s"}</span></span>`;
      } else if (!chain || chain.fetchFailed) {
        chainHtml = `<span class="chip chip-ochre"><span class="dot"></span><span>Chain integrity: unknown</span></span>`;
      } else {
        chainHtml = `<span class="chip chip-red"><span class="dot"></span><span>Chain integrity: ${esc(chain.error || "broken")}</span></span>`;
      }
      const dbVal = h?.db_reachable === false ? "Unreachable" : h?.db_reachable ? "Reachable" : "—";
      const dbCls = h?.db_reachable === false ? "bad" : h?.db_reachable ? "ok" : "";
      const fails = Number(h?.source_failures_24h || 0);
      const trigsCnt = Number(h?.trigger_events_24h || 0);
      const kpiHtml = `<section class="kpi-row fade-up" aria-label="Oracle health">
        <div class="kpi"><div class="kpi-label">Database</div><div class="kpi-value ${dbCls}">${esc(dbVal)}</div><div class="kpi-foot">${esc(h?.db_path || "")}</div></div>
        <div class="kpi"><div class="kpi-label">Last attestation</div><div class="kpi-value" title="${h?.last_attestation_at ? esc(formatTimestamp(h.last_attestation_at)) : ""}">${h?.last_attestation_at ? esc(formatRelative(h.last_attestation_at)) : "Never"}</div><div class="kpi-foot">${h?.last_attestation_at ? esc(formatTimestamp(h.last_attestation_at)) : "No attestation has been published yet"}</div></div>
        <div class="kpi"><div class="kpi-label">Source failures (24h)</div><div class="kpi-value ${fails ? "warn" : "ok"}">${fails}</div><div class="kpi-foot">From upstream feeds</div></div>
        <div class="kpi"><div class="kpi-label">Trigger events (24h)</div><div class="kpi-value ${trigsCnt ? "warn" : ""}">${trigsCnt}</div><div class="kpi-foot">Across monitored contracts</div></div>
      </section>`;
      let latestHtml;
      if (!env?.attestation) {
        latestHtml = `<div class="empty-state"><div class="empty-state-title">No attestations yet</div><div class="empty-state-body">The oracle has not yet published any verified market data.</div></div>`;
      } else {
        const att = env.attestation;
        const dpsHtml = (env.datapoints || []).map(dp => {
          const m = METRIC_LABELS[dp.metric] || dp.metric;
          const s = SOURCE_LABELS[dp.source_id] || { plain: dp.source_id, jargon: dp.source_id };
          const v = dp.unit === "decimal_fraction" ? formatDecimalRate(dp.value)
            : dp.unit === "percent_per_annum" ? Number(dp.value).toFixed(3) + "%"
            : dp.value + " " + (dp.unit || "");
          return `<div class="dp-tile">
            <div class="muted" style="font-size:12px;">${esc(m)} <span class="jargon">${esc(dp.metric)}</span></div>
            <div class="dp-value">${esc(v)}</div>
            <div style="font-size:12px;color:var(--ink-2);">${esc(s.plain)} <span class="jargon">${esc(s.jargon)}</span></div>
            <div class="timestamp" style="margin-top:4px;">As of ${esc(formatRelative(dp.as_of + "T00:00:00Z"))} · ${esc(dp.as_of)}</div>
          </div>`;
        }).join("");
        latestHtml = `<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;">
            <div class="section-h" style="border:0;padding:0;margin:0;"><span class="section-num">02</span><h2 class="section-title">Latest attestation</h2></div>
            <div class="mono muted" style="font-size:12px;">#${String(att.sequence_number).padStart(3, "0")}</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:14px 0 18px;">${dpsHtml}</div>
          <details style="border-top:1px dashed var(--hair-2);padding-top:14px;">
            <summary class="mono" style="cursor:pointer;color:var(--ink-3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;list-style:none;">▸ Signature</summary>
            <div style="margin-top:14px;display:grid;grid-template-columns:140px 1fr;gap:8px 14px;font-family:var(--mono);font-size:12px;">
              <div class="muted">Current hash</div><div style="word-break:break-all;">${esc(att.current_hash)}</div>
              <div class="muted">Previous hash</div><div style="word-break:break-all;">${esc(att.previous_hash || "Genesis")}</div>
              <div class="muted">Payload hash</div><div style="word-break:break-all;">${esc(att.payload_hash)}</div>
              <div class="muted">Signed at</div><div>${esc(formatTimestamp(att.signed_at))}</div>
              <div class="muted">Versions</div><div>oracle ${esc(att.oracle_version)} · rules ${esc(att.rules_version)}</div>
            </div>
          </details>`;
      }
      main.innerHTML = `
        <section class="page-h fade-up">
          <div><div class="num">01 · Oracle</div><h1>Oracle</h1><p class="lede">Verified market data and contractual triggers, with full audit trail.</p></div>
          <div class="aside">${chainHtml}</div>
        </section>
        <div class="stack">
          ${kpiHtml}
          <section class="card fade-up">${latestHtml}</section>
          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;"><span class="section-num">03</span><h2 class="section-title">Recent triggers</h2><span class="section-sub">Last 10 events</span></div>
            ${renderTriggersTable(trigs)}
          </section>
        </div>`;
      bindActionButtons(main);
    }

    /* ──────────────────────────────────────────────────────────────────
       Action handlers (wired via data-act attributes)
       ────────────────────────────────────────────────────────────────── */
    function bindActionButtons(root) {
      root.querySelectorAll('[data-act="approvePi"]').forEach(b =>
        b.addEventListener("click", () => approvePi(b.dataset.cid, Number(b.dataset.period), b)));
      root.querySelectorAll('[data-act="simulate"]').forEach(b =>
        b.addEventListener("click", () => simulateNext(b.dataset.cid, b)));
      root.querySelectorAll('[data-act="approveB"]').forEach(b =>
        b.addEventListener("click", () => approveAdvisorB(b.dataset.cid, b)));
      root.querySelectorAll('[data-act="openContract"]').forEach(el =>
        el.addEventListener("click", (e) => { e.stopPropagation(); openContract(el.dataset.cid); }));
      root.querySelectorAll('[data-act="openOracle"]').forEach(el =>
        el.addEventListener("click", (e) => { e.preventDefault(); nav("oracle"); }));
    }

    async function approvePi(contractId, period, btn) {
      if (btn) { btn.disabled = true; btn.textContent = "Approving…"; }
      const r = await apiFetch(`/api/contracts/${contractId}/approve-pi/${period}?approver=${encodeURIComponent("J.Smith (Linklaters)")}`, { method: "POST" });
      if (r.ok) {
        delete state.details[contractId];
        toast(`PI P${period} approved — ${contractId}`, "info");
        await refresh();
      } else {
        if (btn) { btn.disabled = false; btn.textContent = "Approve PI"; }
        toast("Error approving PI: " + (r.error || "unknown"), "error");
      }
    }

    async function simulateNext(contractId, btn) {
      const orig = btn ? btn.textContent : "";
      if (btn) { btn.disabled = true; btn.textContent = "Simulating…"; }
      const r = await apiFetch(`/api/contracts/${contractId}/simulate-next-period`, { method: "POST" });
      if (r.ok && r.data) {
        delete state.details[contractId];
        toast(`P${r.data.period || "?"} simulated · ${eur(r.data.net_amount, 2)} · ${contractId}`, "info");
        await refresh();
      } else {
        if (btn) { btn.disabled = false; btn.textContent = orig; }
        toast("Simulation error: " + (r.error || "unknown"), "error");
      }
    }

    async function approveAdvisorB(contractId, btn) {
      if (btn) { btn.disabled = true; btn.textContent = "Approving…"; }
      const r = await apiFetch(`/api/contracts/${contractId}/approve-advisor`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ approved_by: "J.Smith (Linklaters) — Advisor B" }),
      });
      if (r.ok) {
        toast("Approved as advisor B", "info");
        await refresh();
      } else {
        if (btn) { btn.disabled = false; btn.textContent = "Approve as advisor B"; }
        toast("Error: " + (r.error || "unknown"), "error");
      }
    }

    async function confirmAndGenerateNotice(contractId, noticeType) {
      const t = NOTICE_TYPES.find(n => n.v === noticeType);
      if (!confirm(`Generate ${t?.l || noticeType} for ${contractId}?\n\nA signed PDF will be produced and recorded in the audit trail.`)) return;
      const today2 = new Date();
      const grace = new Date(Date.now() + 20 * 86400000);
      const fmtUk = d => d.toLocaleDateString("en-GB");
      const NOTICE_DETAILS = {
        FAILURE_TO_PAY:      { party_defaulting: "Counterparty", currency: "EUR", amount: "TBD", due_date: today(), grace_period: "1 Local Business Day", grace_end: today() },
        BREACH_OF_AGREEMENT: { party_defaulting: "Counterparty", obligation: "Obligation TBD", due_date: today(), section: "§4(a)(ii)" },
        ETD_DESIGNATION:     { eod_notice_date: fmtUk(today2), eod_type: "§5(a)(i) Failure to Pay", etd_date: fmtUk(grace), currency: "EUR" },
        DELIVERY_REMINDER:   { document: "Annual Financials / Compliance Certificate", due_date: today() },
        TAX_CHANGE:          { description: "Change in tax status", effective_date: today() },
      };
      const r = await apiFetch(`/api/contracts/${contractId}/notice`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ notice_type: noticeType, details: NOTICE_DETAILS[noticeType] || {} }),
      });
      if (r.ok && r.data) {
        state.notices.unshift({
          contract_id: contractId,
          type: noticeType,
          hash: r.data.hash,
          pdf: r.data.pdf || (r.data.pdf_path ? `/${r.data.pdf_path}` : ""),
          timestamp: new Date().toISOString(),
        });
        toast(`Notice ${t?.l || noticeType} generated`, "info");
        await refresh();
      } else {
        toast("Notice error: " + (r.error || "unknown"), "error");
      }
    }

    async function validateDoc(contractId, docId, entityName, accepted) {
      const payload = {
        advisor: "J.Smith (Linklaters)",
        accepted,
        notes: accepted ? "Reviewed and accepted by advisor" : "Rejected — see advisor notes",
      };
      const path = entityName
        ? `/api/entities/${encodeURIComponent(entityName)}/documents/${docId}/validate`
        : `/api/contracts/${contractId}/due-diligence/${docId}/validate`;
      const r = await apiFetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (r.ok) {
        if (entityName) state.contracts.forEach(c => { delete state.dd[c.id]; });
        else delete state.dd[contractId];
        toast(accepted ? "Document accepted" : "Document rejected", accepted ? "info" : "warn");
        await refresh();
      } else {
        toast("Validate error: " + (r.error || "unknown"), "error");
      }
    }

    async function resolveCmt(contractId, commentId) {
      const r = await apiFetch(`/api/contracts/${contractId}/comments/${commentId}/resolve`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ resolved_by: "J.Smith (Linklaters)" }),
      });
      if (r.ok) {
        delete state.comments[contractId];
        toast("Comment resolved", "info");
        await refresh();
      } else {
        toast("Error: " + (r.error || "unknown"), "error");
      }
    }
    async function submitAdvisorComment(contractId) {
      const ta = document.getElementById("adv-cmt-text");
      const msg = document.getElementById("adv-cmt-msg");
      const text = (ta?.value || "").trim();
      if (!text) { if (msg) { msg.textContent = "Enter a comment first."; msg.style.color = "var(--red)"; } return; }
      const btn = document.getElementById("adv-cmt-submit");
      btn.disabled = true; btn.textContent = "Submitting…";
      const r = await apiFetch(`/api/contracts/${contractId}/comments`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ author: "J.Smith (Linklaters)", role: "advisor", text }),
      });
      if (r.ok) {
        delete state.comments[contractId];
        toast("Comment submitted", "info");
        await refresh();
      } else {
        btn.disabled = false; btn.textContent = "Submit comment";
        if (msg) { msg.textContent = "Error: " + (r.error || "unknown"); msg.style.color = "var(--red)"; }
      }
    }

    /* ──────────────────────────────────────────────────────────────────
       New contract modal
       ────────────────────────────────────────────────────────────────── */
    function openNewContract() {
      const today2  = new Date();
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 2);
      const term2y  = new Date(); term2y.setFullYear(term2y.getFullYear() + 2);
      const fmt = d => d.toISOString().slice(0, 10);
      const cid = "SLC-IRS-EUR-" + (1000 + Math.floor(Math.random() * 9000));
      const html = `
        <div class="modal-bg" id="nc-bg">
          <div class="modal" role="dialog" aria-modal="true">
            <div class="modal-h">
              <div class="section-h" style="border:0;padding:0;margin:0;">
                <span class="section-num">New</span>
                <h2 class="section-title">New contract</h2>
              </div>
              <div class="muted" style="font-size:12.5px;margin-top:8px;">
                Interest rate swap. ISDA 2002 defaults apply (English law, EURIBOR 3M, quarterly, §2(c) netting).
              </div>
            </div>
            <div class="modal-b">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;">
                <div><label class="field-label">Contract ID</label><input id="nc-id" class="input" value="${cid}" /></div>
                <div></div>
                <div><label class="field-label">Client (Party A)</label><input id="nc-pa" class="input" placeholder="Alpha Corp S.A." /></div>
                <div><label class="field-label">Client jurisdiction</label><input id="nc-paj" class="input" value="GB" maxlength="2" /></div>
                <div><label class="field-label">Counterparty (Party B)</label><input id="nc-pb" class="input" placeholder="Beta Fund Ltd" /></div>
                <div><label class="field-label">Counterparty jurisdiction</label><input id="nc-pbj" class="input" value="FR" maxlength="2" /></div>
                <div><label class="field-label">Notional (EUR)</label><input id="nc-not" class="input" type="number" placeholder="10000000" value="10000000" /></div>
                <div><label class="field-label">Fixed rate (%)</label><input id="nc-rate" class="input" type="number" step="0.001" placeholder="3.200" value="3.200" /></div>
                <div><label class="field-label">Effective date</label><input id="nc-eff" class="input" type="date" value="${fmt(tomorrow)}" /></div>
                <div><label class="field-label">Termination date</label><input id="nc-term" class="input" type="date" value="${fmt(term2y)}" /></div>
              </div>
              <div id="nc-err" style="font-size:12px;color:var(--red);margin-top:12px;"></div>
            </div>
            <div class="modal-f">
              <button class="btn" id="nc-cancel" type="button">Cancel</button>
              <button class="btn btn-ochre" id="nc-submit" type="button">Create contract</button>
            </div>
          </div>
        </div>`;
      const host = document.getElementById("modal-host");
      host.innerHTML = html;
      const node = host.firstElementChild;
      const close = () => host.innerHTML = "";
      node.addEventListener("click", e => { if (e.target === node) close(); });
      node.querySelector("#nc-cancel").addEventListener("click", close);
      node.querySelector("#nc-submit").addEventListener("click", () => submitNewContract(node, close));
    }

    async function submitNewContract(node, close) {
      const err = node.querySelector("#nc-err");
      const v = id => node.querySelector("#" + id).value.trim();
      err.textContent = "";
      const id = v("nc-id");
      const pa = v("nc-pa"), paj = v("nc-paj").toUpperCase();
      const pb = v("nc-pb"), pbj = v("nc-pbj").toUpperCase();
      const notional = parseFloat(v("nc-not"));
      const rate = parseFloat(v("nc-rate"));
      const eff = v("nc-eff"), term = v("nc-term");
      if (!id)                       return err.textContent = "Contract ID is required";
      if (!pa)                       return err.textContent = "Client name is required";
      if (!pb)                       return err.textContent = "Counterparty name is required";
      if (pa.toLowerCase() === pb.toLowerCase()) return err.textContent = "Client and counterparty must differ";
      if (!notional || notional <= 0) return err.textContent = "Enter a valid notional";
      if (!rate || rate <= 0)         return err.textContent = "Enter a valid fixed rate";
      if (rate >= 50)                 return err.textContent = "Rate must be less than 50%";
      if (!eff || !term)              return err.textContent = "Both dates are required";
      if (eff >= term)                return err.textContent = "Termination must be after effective date";

      const btn = node.querySelector("#nc-submit");
      btn.disabled = true; btn.textContent = "Creating…";
      const r = await apiFetch("/api/contracts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contract_id: id,
          party_a_name: pa, party_a_short: pa.split(" ")[0], party_a_jurisdiction: paj,
          party_b_name: pb, party_b_short: pb.split(" ")[0], party_b_jurisdiction: pbj,
          notional: Number(notional), fixed_rate: Number(rate) / 100,
          effective_date: eff, termination_date: term,
          initiated_by: "ADVISOR",
          governing_law: "English Law",
          mtpn: true, aet: false, csa: false,
          contract_mode: "advisor_managed",
          created_by_role: "advisor",
        }),
      });
      if (r.ok && r.data) {
        toast(`Contract ${r.data.contract_id || id} created`, "info");
        close();
        await refresh();
      } else {
        err.textContent = "Error: " + (r.error || "unknown");
        btn.disabled = false; btn.textContent = "Create contract";
      }
    }

  </script>
