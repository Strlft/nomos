<!doctype html>
<html lang="en" data-theme="light" data-jargon="meta">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nomos · Client</title>
  <link rel="stylesheet" href="/static/assets/nomos.css">
  <style>
    /* Page-local layout only. All component styles come from nomos.css. */
    html, body { overflow: hidden; }
    .shell { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 210px; flex-shrink: 0; padding: 24px 0; display: flex; flex-direction: column; border-right: 1px solid var(--hair); background: var(--paper); }
    .side-group { padding: 14px 22px 4px; }
    .side-group .label { color: var(--ink-4); }
    .side-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 22px; font-size: 13.5px; color: var(--ink-2); cursor: pointer; border-left: 2px solid transparent; transition: background .12s, color .12s, border-color .12s; }
    .side-item:hover { background: var(--paper-2); color: var(--ink); }
    .side-item.on { color: var(--ink); background: var(--paper-2); border-left-color: var(--ochre); font-weight: 500; }
    .side-item .badge { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); }
    .side-foot { margin-top: auto; padding: 16px 22px; border-top: 1px solid var(--hair); font-size: 11.5px; color: var(--ink-3); line-height: 1.7; }
    .main { flex: 1; overflow-y: auto; background: var(--paper); }
    .demo-banner { display: none; padding: 9px 28px; background: var(--ochre-bg); color: var(--ochre); font-size: 12.5px; border-bottom: 1px solid var(--hair); }
    .demo-banner.on { display: block; }
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 36px 96px; }
    .page-h { display: grid; grid-template-columns: 1fr auto; gap: 18px; align-items: end; padding: 28px 0 20px; border-bottom: 1px solid var(--hair); margin-bottom: 28px; }
    .page-h .num { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
    .page-h h1 { font-family: var(--display); font-weight: 400; font-size: 56px; letter-spacing: -.02em; line-height: 1; margin: 8px 0 12px; }
    .page-h .lede { font-family: var(--display); font-size: 17px; line-height: 1.5; color: var(--ink-2); max-width: 640px; }
    .stack { display: flex; flex-direction: column; gap: 22px; }
    .hero-para { font-family: var(--display); font-size: 21px; line-height: 1.45; color: var(--ink); max-width: 720px; padding: 4px 0 8px; }
    .dp-tile { padding: 18px 22px; border: 1px solid var(--hair); border-radius: var(--r-md); background: var(--paper); display: flex; flex-direction: column; gap: 4px; }
    .dp-tile .dp-value { font-family: var(--display); font-size: 30px; letter-spacing: -.01em; color: var(--ink); line-height: 1.05; margin: 4px 0 8px; }
    .quick-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .tabs { display: flex; border-bottom: 1px solid var(--hair); margin-bottom: 22px; }
    .tab { padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--ink-3); background: transparent; border: 0; border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
    .tab:hover { color: var(--ink); }
    .tab.on { color: var(--ink); border-bottom-color: var(--ochre); font-weight: 500; }
    .kv { display: grid; grid-template-columns: 180px 1fr; gap: 8px 16px; font-size: 13px; color: var(--ink-2); }
    .kv dt { color: var(--ink-3); font-family: var(--mono); font-size: 11px; letter-spacing: .04em; padding-top: 2px; text-transform: uppercase; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; max-width: 720px; }
    .profile-grid .full { grid-column: 1 / -1; }
    .pdf-frame { width: 100%; height: 460px; border: 1px solid var(--hair); border-radius: var(--r-sm); background: var(--card); }
    .id-cell { font-family: var(--mono); color: var(--ochre); cursor: pointer; }
    .detail-back { background: transparent; border: 0; cursor: pointer; font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: .04em; text-transform: uppercase; padding: 4px 0 0; }
    .detail-back:hover { color: var(--ink); }
    @media (max-width: 860px) { .sidebar { display: none; } .page { padding: 22px 18px 80px; } .profile-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">N</div>
      <div class="logo-word">Nomos</div>
    </div>
    <div class="row" style="gap:12px;">
      <span class="chip mono">Client</span>
      <span id="conn-chip" class="chip" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span class="conn-text">Connecting…</span>
      </span>
      <button id="sign-out-btn" class="btn btn-ghost btn-sm" type="button">Sign out</button>
    </div>
  </header>

  <div id="demo-banner" class="demo-banner" role="status">
    Demonstration mode — uploaded documents are auto-validated for testing.
  </div>

  <div class="shell">
    <nav class="sidebar" aria-label="Primary">
      <div class="side-group"><span class="label">Portfolio</span></div>
      <div class="side-item on" data-view="today">Today</div>
      <div class="side-item" data-view="contracts">
        <span>Contracts</span>
        <span class="badge" id="badge-contracts">—</span>
      </div>
      <div class="side-item" data-view="oracle">Oracle</div>
      <div class="side-group" style="margin-top:18px;"><span class="label">Account</span></div>
      <div class="side-item" data-view="documents">Documents</div>
      <div class="side-item" data-view="profile">Profile</div>

      <div class="side-foot">
        Legal advisor<br>
        <span class="strong">Linklaters LLP</span><br><br>
        Calculation Agent · Party A
      </div>
    </nav>

    <main class="main">
      <div id="conn-banner" class="conn-banner hidden" role="status" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span>Connection to the API interrupted. Retrying…</span>
      </div>
      <div id="page" class="page" aria-live="polite"></div>
    </main>
  </div>

  <script type="module">
    import {
      apiFetch,
      formatTimestamp,
      formatRelative,
      formatDecimalRate,
      formatHashShort,
      toast,
    } from "/static/assets/nomos-ui.js";

    /* ──────────────────────────────────────────────────────────────────
       Dictionaries
       ────────────────────────────────────────────────────────────────── */
    const RULE_LABELS = {
      "R-001": "Failure to pay",
      "R-002": "Breach of agreement",
      "R-003": "Cross default",
      "R-004": "Illegality",
      "R-005": "Tax event",
      "R-006": "Material adverse change",
    };
    const SEVERITY_CHIPS = {
      "warning":           { cls: "chip-ochre", label: "Warning" },
      "potential_trigger": { cls: "chip-blue",  label: "Potential trigger" },
      "trigger":           { cls: "chip-red",   label: "Trigger" },
    };
    const METRIC_LABELS = {
      "ESTR":        "Euro short-term rate",
      "EURIBOR_3M":  "3-month EURIBOR",
      "EURIBOR_6M":  "6-month EURIBOR",
      "EURIBOR_12M": "12-month EURIBOR",
    };
    const SOURCE_LABELS = {
      "ecb_sdw_v1": { plain: "European Central Bank", jargon: "ECB SDW" },
      "fake_v1":    { plain: "Synthetic source",      jargon: "FAKE" },
    };

    /* ──────────────────────────────────────────────────────────────────
       Module-scope state
       ────────────────────────────────────────────────────────────────── */
    const state = {
      contracts: [],
      details: {},     // keyed by contract_id
      dd: {},          // keyed by contract_id
      ready: {},       // keyed by contract_id
      comments: {},    // keyed by contract_id
      profile: {},
      oracle: {},
      v2: { health: null, latest: null, triggers: [], chainOk: null },
      loaded: false,
      error: null,
    };
    let view = "today";
    let exContract = null;        // currently expanded contract id (detail view)
    let detailTab = "summary";    // summary | schedule | documents

    /* ──────────────────────────────────────────────────────────────────
       Auth gate + sign out (preserves legacy behavior)
       ────────────────────────────────────────────────────────────────── */
    (function gateRole() {
      const r = localStorage.getItem("nomos_role");
      if (r && r !== "client") window.location.href = "/";
    })();
    function signOut() {
      localStorage.removeItem('nomos_role');
      window.location.href = '/';
    }
    document.getElementById("sign-out-btn").addEventListener("click", signOut);

    /* ──────────────────────────────────────────────────────────────────
       Utilities
       ────────────────────────────────────────────────────────────────── */
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => (
      { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]
    ));
    const eur = (v, d=0) => v == null
      ? "—"
      : "€" + Number(v).toLocaleString("en-GB", { minimumFractionDigits: d, maximumFractionDigits: d });
    const pct = (v) => v == null ? "—" : (Number(v) * 100).toFixed(3) + "%";
    const today = () => new Date().toISOString().slice(0, 10);
    const daysFromNow = (iso) => {
      const d = new Date(iso + "T00:00:00Z").getTime();
      const t = new Date(); t.setUTCHours(0,0,0,0);
      return Math.round((d - t.getTime()) / 86400000);
    };
    function statusChip(status) {
      const map = {
        ACTIVE:             { cls: "chip-green",  text: "Active" },
        PENDING_SIGNATURE:  { cls: "chip-ochre",  text: "Pending signature" },
        PENDING_INITIATOR:  { cls: "chip-ochre",  text: "Awaiting your signature" },
        PENDING_COUNTERPARTY: { cls: "chip-blue", text: "Awaiting counterparty" },
        SUSPENDED:          { cls: "chip-red",    text: "Suspended" },
        TERMINATED:         { cls: "chip-",       text: "Terminated" },
        EARLY_TERM_NOTIFIED:{ cls: "chip-ochre",  text: "Early termination notified" },
      };
      const m = map[status] || { cls: "chip-", text: status };
      return `<span class="chip ${m.cls}"><span class="dot"></span><span>${esc(m.text)}</span></span>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       Connection chip + banner
       ────────────────────────────────────────────────────────────────── */
    function setConn(ok) {
      const c = document.getElementById("conn-chip");
      const b = document.getElementById("conn-banner");
      c.classList.remove("chip-green", "chip-ochre");
      c.classList.add(ok ? "chip-green" : "chip-ochre");
      c.querySelector(".conn-text").textContent = ok ? "Live" : "Reconnecting…";
      b.classList.toggle("hidden", ok);
    }

    /* ──────────────────────────────────────────────────────────────────
       Demo banner — uses legacy /api/demo-mode (returns { demo: bool })
       ────────────────────────────────────────────────────────────────── */
    async function pollDemo() {
      const r = await apiFetch("/api/demo-mode");
      const on = r.ok && r.data && (r.data.demo === true || r.data.enabled === true);
      document.getElementById("demo-banner").classList.toggle("on", !!on);
    }

    /* ──────────────────────────────────────────────────────────────────
       Polling — every 30s. Calls legacy and v2 endpoints in parallel.
       Detail-only data (per-contract) loaded on demand by openContract.
       ────────────────────────────────────────────────────────────────── */
    let inFlight = false;
    async function refresh() {
      if (inFlight) return;
      inFlight = true;
      try {
        const [csR, orcR, _ratesR, profR, healthR, latestR, trigsR, verifyR] = await Promise.all([
          apiFetch("/api/contracts?role=client"),
          apiFetch("/api/oracle/latest"),
          apiFetch("/api/oracle/rates"),
          apiFetch("/api/client/profile"),
          apiFetch("/api/v2/oracle/health"),
          apiFetch("/api/v2/oracle/attestations/latest"),
          apiFetch("/api/v2/oracle/triggers?limit=10"),
          apiFetch("/api/v2/oracle/chain/verify"),
        ]);
        if (csR.ok && Array.isArray(csR.data)) state.contracts = csR.data;
        if (orcR.ok && orcR.data) state.oracle = orcR.data;
        if (profR.ok && profR.data) state.profile = profR.data.profile || profR.data || {};
        state.v2.health   = healthR.ok ? healthR.data : null;
        state.v2.latest   = (latestR.ok || latestR.status === 503) ? latestR.data : null;
        state.v2.triggers = (trigsR.ok && Array.isArray(trigsR.data)) ? trigsR.data : [];
        state.v2.chainOk  = (verifyR.ok && verifyR.data) ? !!verifyR.data.ok : null;
        state.loaded = true;
        state.error  = csR.ok ? null : "API unreachable — is the server running on :8000?";
        setConn(csR.ok);

        document.getElementById("badge-contracts").textContent = String(state.contracts.length);

        // Refresh the currently open detail.
        if (exContract && state.contracts.find(c => c.id === exContract)) {
          const dR = await apiFetch(`/api/contracts/${exContract}?role=client`);
          if (dR.ok) state.details[exContract] = dR.data;
        }
        render();
      } finally {
        inFlight = false;
      }
    }
    pollDemo();
    refresh();
    setInterval(refresh, 30_000);

    /* ──────────────────────────────────────────────────────────────────
       Navigation
       ────────────────────────────────────────────────────────────────── */
    function nav(v) {
      view = v;
      exContract = null;
      detailTab = "summary";
      document.querySelectorAll(".side-item").forEach(el => {
        el.classList.toggle("on", el.dataset.view === v);
      });
      render();
    }
    document.querySelectorAll(".side-item").forEach(el => {
      el.addEventListener("click", () => nav(el.dataset.view));
    });

    /* ──────────────────────────────────────────────────────────────────
       Render dispatcher
       ────────────────────────────────────────────────────────────────── */
    function render() {
      const main = document.getElementById("page");
      if (view === "today")     return renderToday(main);
      if (view === "contracts") return exContract ? renderContractDetail(main) : renderContracts(main);
      if (view === "oracle")    return renderOracle(main);
      if (view === "documents") return renderDocuments(main);
      if (view === "profile")   return renderProfile(main);
    }

    /* ──────────────────────────────────────────────────────────────────
       View 1 — Today
       ────────────────────────────────────────────────────────────────── */
    function todayHeroSentence(name) {
      if (!state.loaded) return `Loading the latest from your portfolio…`;
      const c = state.contracts.length;
      if (state.error)            return `Connection to the API was interrupted. Retrying.`;
      if (c === 0)                return `Welcome back${name ? ", " + name : ""}. No contracts yet.`;
      const trig = state.v2.triggers.find(t => t.severity === "trigger");
      if (trig) {
        const lbl = RULE_LABELS[trig.rule_id] || trig.rule_id;
        return `Action required. ${lbl} on ${trig.contract_id}. Review the contract and contact your advisor.`;
      }
      let soonest = null;
      for (const cid of Object.keys(state.details)) {
        const det = state.details[cid];
        if (!det || !det.periods) continue;
        for (const p of det.periods) {
          if (p.payment_confirmed) continue;
          if (p.fixed_amount === null) continue;
          if (!soonest || p.payment_date < soonest.payment_date) {
            soonest = { ...p, cid, cp: state.contracts.find(x => x.id === cid)?.party_b || cid };
          }
        }
      }
      if (soonest) {
        const days = daysFromNow(soonest.payment_date);
        const amt  = eur(soonest.net_amount);
        if (days < 0)  return `Action required. The payment of ${amt} to ${esc(soonest.cp)} was due ${Math.abs(days)} day${Math.abs(days)===1?"":"s"} ago and remains pending.`;
        if (days === 0) return `You have a payment due today: ${amt} to ${esc(soonest.cp)}.`;
        return `You have 1 payment due in ${days} day${days===1?"":"s"} for ${amt} net to ${esc(soonest.cp)}. ${c} active contract${c===1?"":"s"}.`;
      }
      return `All clear. No payments due this week. ${c} active contract${c===1?"":"s"}, all performing nominally.`;
    }

    function renderToday(main) {
      const name = state.profile?.company_name || "";
      const subtitle = name
        ? `What needs your attention today, ${esc(name)}.`
        : `What needs your attention today.`;
      const hero = todayHeroSentence(name);

      // Active triggers panel
      const trigs = state.v2.triggers.filter(t => t.severity === "trigger" || t.severity === "potential_trigger");
      const trigHtml = triggersTableHtml(trigs, "No active triggers", "All monitored conditions are nominal.");

      // Market data tile from v2 latest
      const mdHtml = renderMarketTile();

      main.innerHTML = `
        <section class="page-h fade-up">
          <div>
            <div class="num">01 · Today</div>
            <h1>Today</h1>
            <p class="lede">${subtitle}</p>
          </div>
        </section>

        <div class="stack">
          <section class="card fade-up"><p class="hero-para">${hero}</p></section>

          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">02</span>
              <h2 class="section-title">Active triggers</h2>
              <span class="section-sub">${trigs.length} active</span>
            </div>
            ${trigHtml}
          </section>

          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">03</span>
              <h2 class="section-title">Market data</h2>
            </div>
            ${mdHtml}
          </section>

          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">04</span>
              <h2 class="section-title">Quick actions</h2>
            </div>
            <div class="quick-links">
              <button class="btn" data-jump="contracts" type="button">View contracts</button>
              <button class="btn" data-jump="documents" type="button">View documents</button>
              <button class="btn" data-jump="profile"   type="button">Update profile</button>
            </div>
          </section>
        </div>
      `;
      main.querySelectorAll("button[data-jump]").forEach(b => {
        b.addEventListener("click", () => nav(b.dataset.jump));
      });
    }

    function renderMarketTile() {
      const env = state.v2.latest;
      const chainOk = state.v2.chainOk;
      let chainHtml = "";
      if (chainOk === true) {
        chainHtml = `<span class="chip chip-green"><span class="dot"></span><span>Audit trail verified</span></span>`;
      } else if (chainOk === false) {
        chainHtml = `<span class="chip chip-red"><span class="dot"></span><span>Audit trail mismatch</span></span>`;
      } else {
        chainHtml = `<span class="chip chip-ochre"><span class="dot"></span><span>Audit trail: checking…</span></span>`;
      }
      if (!env || !env.attestation || !Array.isArray(env.datapoints) || env.datapoints.length === 0) {
        return `<div class="empty-state">
          <div class="empty-state-title">Market data unavailable</div>
          <div class="empty-state-body">The Oracle has not yet published a verified rate.</div>
        </div>`;
      }
      const estr = env.datapoints.find(d => d.metric === "ESTR") || env.datapoints[0];
      const valTxt = estr.unit === "decimal_fraction"
        ? formatDecimalRate(estr.value)
        : Number(estr.value).toFixed(3) + "%";
      return `
        <div style="display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;">
          <div class="dp-tile">
            <div class="muted" style="font-size:12px;">Euro short-term rate <span class="jargon">${esc(estr.metric)}</span></div>
            <div class="dp-value">${esc(valTxt)}</div>
            <div style="font-size:12px;color:var(--ink-2);">European Central Bank <span class="jargon">ECB SDW</span></div>
            <div class="timestamp" style="margin-top:4px;">As of ${esc(formatRelative(estr.as_of + "T00:00:00Z"))} · ${esc(estr.as_of)}</div>
          </div>
          <div>${chainHtml}</div>
        </div>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       Triggers table — shared between Today and Oracle views.
       ────────────────────────────────────────────────────────────────── */
    function triggersTableHtml(trigs, emptyTitle, emptyBody) {
      if (!trigs.length) {
        return `<div class="empty-state"><div class="empty-state-title">${esc(emptyTitle)}</div><div class="empty-state-body">${esc(emptyBody)}</div></div>`;
      }
      return `<table class="table"><thead><tr><th>Severity</th><th>Rule</th><th>Clause</th><th>Contract</th><th>When</th></tr></thead><tbody>${trigs.map(ev => {
        const sev = SEVERITY_CHIPS[ev.severity] || { cls: "", label: ev.severity };
        const lbl = RULE_LABELS[ev.rule_id] || ev.rule_id;
        return `<tr>
          <td><span class="chip ${sev.cls}"><span class="dot"></span><span>${esc(sev.label)}</span></span></td>
          <td><span class="strong">${esc(lbl)}</span> <span class="jargon">${esc(ev.rule_id)}</span></td>
          <td><span class="jargon">${esc(ev.clause_ref)}</span></td>
          <td>${esc(ev.contract_id)}</td>
          <td><span class="timestamp" title="${esc(formatTimestamp(ev.evaluated_at))}">${esc(formatRelative(ev.evaluated_at))}</span></td>
        </tr>`;
      }).join("")}</tbody></table>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       Oracle — internal view (mirrors /oracle inside the portal shell)
       ────────────────────────────────────────────────────────────────── */
    function renderOracle(main) {
      const env = state.v2.latest, chain = state.v2.chain, h = state.v2.health;
      const trigs = (state.v2.triggers || []).slice(0, 10);
      let chainHtml;
      if (chain?.ok) {
        const n = chain.attestations_count || 0;
        chainHtml = `<span class="chip chip-green"><span class="dot"></span><span>Chain integrity: OK · ${n} attestation${n === 1 ? "" : "s"}</span></span>`;
      } else if (!chain || chain.fetchFailed) {
        chainHtml = `<span class="chip chip-ochre"><span class="dot"></span><span>Chain integrity: unknown</span></span>`;
      } else {
        chainHtml = `<span class="chip chip-red"><span class="dot"></span><span>Chain integrity: ${esc(chain.error || "broken")}</span></span>`;
      }
      const dbVal = h?.db_reachable === false ? "Unreachable" : h?.db_reachable ? "Reachable" : "—";
      const dbCls = h?.db_reachable === false ? "bad" : h?.db_reachable ? "ok" : "";
      const fails = Number(h?.source_failures_24h || 0);
      const trigsCnt = Number(h?.trigger_events_24h || 0);
      const kpiHtml = `<section class="kpi-row fade-up" aria-label="Oracle health">
        <div class="kpi"><div class="kpi-label">Database</div><div class="kpi-value ${dbCls}">${esc(dbVal)}</div><div class="kpi-foot">${esc(h?.db_path || "")}</div></div>
        <div class="kpi"><div class="kpi-label">Last attestation</div><div class="kpi-value" title="${h?.last_attestation_at ? esc(formatTimestamp(h.last_attestation_at)) : ""}">${h?.last_attestation_at ? esc(formatRelative(h.last_attestation_at)) : "Never"}</div><div class="kpi-foot">${h?.last_attestation_at ? esc(formatTimestamp(h.last_attestation_at)) : "No attestation has been published yet"}</div></div>
        <div class="kpi"><div class="kpi-label">Source failures (24h)</div><div class="kpi-value ${fails ? "warn" : "ok"}">${fails}</div><div class="kpi-foot">From upstream feeds</div></div>
        <div class="kpi"><div class="kpi-label">Trigger events (24h)</div><div class="kpi-value ${trigsCnt ? "warn" : ""}">${trigsCnt}</div><div class="kpi-foot">Across monitored contracts</div></div>
      </section>`;
      let latestHtml;
      if (!env?.attestation) {
        latestHtml = `<div class="empty-state"><div class="empty-state-title">No attestations yet</div><div class="empty-state-body">The oracle has not yet published any verified market data.</div></div>`;
      } else {
        const att = env.attestation;
        const dpsHtml = (env.datapoints || []).map(dp => {
          const m = METRIC_LABELS[dp.metric] || dp.metric;
          const s = SOURCE_LABELS[dp.source_id] || { plain: dp.source_id, jargon: dp.source_id };
          const v = dp.unit === "decimal_fraction" ? formatDecimalRate(dp.value)
            : dp.unit === "percent_per_annum" ? Number(dp.value).toFixed(3) + "%"
            : dp.value + " " + (dp.unit || "");
          return `<div class="dp-tile">
            <div class="muted" style="font-size:12px;">${esc(m)} <span class="jargon">${esc(dp.metric)}</span></div>
            <div class="dp-value">${esc(v)}</div>
            <div style="font-size:12px;color:var(--ink-2);">${esc(s.plain)} <span class="jargon">${esc(s.jargon)}</span></div>
            <div class="timestamp" style="margin-top:4px;">As of ${esc(formatRelative(dp.as_of + "T00:00:00Z"))} · ${esc(dp.as_of)}</div>
          </div>`;
        }).join("");
        latestHtml = `<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;">
            <div class="section-h" style="border:0;padding:0;margin:0;"><span class="section-num">02</span><h2 class="section-title">Latest attestation</h2></div>
            <div class="mono muted" style="font-size:12px;">#${String(att.sequence_number).padStart(3, "0")}</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:14px 0 18px;">${dpsHtml}</div>
          <details style="border-top:1px dashed var(--hair-2);padding-top:14px;">
            <summary class="mono" style="cursor:pointer;color:var(--ink-3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;list-style:none;">▸ Signature</summary>
            <div style="margin-top:14px;display:grid;grid-template-columns:140px 1fr;gap:8px 14px;font-family:var(--mono);font-size:12px;">
              <div class="muted">Current hash</div><div style="word-break:break-all;">${esc(att.current_hash)}</div>
              <div class="muted">Previous hash</div><div style="word-break:break-all;">${esc(att.previous_hash || "Genesis")}</div>
              <div class="muted">Payload hash</div><div style="word-break:break-all;">${esc(att.payload_hash)}</div>
              <div class="muted">Signed at</div><div>${esc(formatTimestamp(att.signed_at))}</div>
              <div class="muted">Versions</div><div>oracle ${esc(att.oracle_version)} · rules ${esc(att.rules_version)}</div>
            </div>
          </details>`;
      }
      const trigsHtml = triggersTableHtml(trigs, "No trigger events recorded", "All monitored conditions are nominal.");
      main.innerHTML = `
        <section class="page-h fade-up">
          <div><div class="num">01 · Oracle</div><h1>Oracle</h1><p class="lede">Verified market data and contractual triggers, with full audit trail.</p></div>
          <div class="aside">${chainHtml}</div>
        </section>
        <div class="stack">
          ${kpiHtml}
          <section class="card fade-up">${latestHtml}</section>
          <section class="card fade-up">
            <div class="section-h" style="margin-bottom:14px;"><span class="section-num">03</span><h2 class="section-title">Recent triggers</h2><span class="section-sub">Last 10 events</span></div>
            ${trigsHtml}
          </section>
        </div>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       View 2 — Contracts (table + detail)
       ────────────────────────────────────────────────────────────────── */
    function renderContracts(main) {
      const D = state.contracts;
      const body = D.length === 0
        ? `<div class="empty-state">
             <div class="empty-state-title">No contracts yet</div>
             <div class="empty-state-body">Once your advisor drafts a contract, it will appear here.</div>
           </div>`
        : `<table class="table"><thead><tr>
             <th>Contract</th><th>Counterparty</th><th>Notional</th>
             <th>Status</th><th>Next payment</th>
           </tr></thead><tbody>${D.map(x => {
             const np = x.next_payment;
             const npTxt = np ? `${eur(np.amount)} · ${esc(np.date)}` : "—";
             return `<tr class="contract-row" data-id="${esc(x.id)}">
               <td><span class="id-cell">${esc(x.id)}</span></td>
               <td>${esc(x.party_b)}</td>
               <td class="mono">${eur(x.notional)} ${esc(x.currency || "EUR")}</td>
               <td>${statusChip(x.workflow_status || x.status)}</td>
               <td class="timestamp">${esc(npTxt)}</td>
             </tr>`;
           }).join("")}</tbody></table>`;

      main.innerHTML = `
        <section class="page-h fade-up">
          <div>
            <div class="num">01 · Contracts</div>
            <h1>Contracts</h1>
            <p class="lede">Your active and past derivatives portfolio.</p>
          </div>
          <div class="aside">
            <button id="btn-direct-contract" class="btn btn-sm" type="button">+ Direct contract</button>
          </div>
        </section>
        <div class="stack">
          <section class="card fade-up">${body}</section>
        </div>
      `;
      main.querySelectorAll(".contract-row").forEach(tr => {
        tr.addEventListener("click", () => openContract(tr.dataset.id));
      });
      const dcBtn = document.getElementById("btn-direct-contract");
      if (dcBtn) dcBtn.addEventListener("click", openDirectContract);
    }

    async function openContract(id) {
      exContract = id;
      detailTab = "summary";
      // Lazy-load the satellites; render() may fire before they finish.
      const tasks = [];
      if (!state.details[id])  tasks.push(apiFetch(`/api/contracts/${id}?role=client`).then(r => { if (r.ok) state.details[id] = r.data; }));
      if (!state.dd[id])       tasks.push(apiFetch(`/api/contracts/${id}/due-diligence`).then(r => { if (r.ok) state.dd[id] = r.data; }));
      if (!state.ready[id])    tasks.push(apiFetch(`/api/contracts/${id}/signing-readiness`).then(r => { if (r.ok) state.ready[id] = r.data; }));
      if (!state.comments[id]) tasks.push(apiFetch(`/api/contracts/${id}/comments`).then(r => { if (r.ok) state.comments[id] = r.data; }));
      render();
      await Promise.all(tasks);
      render();
    }

    function renderContractDetail(main) {
      const id = exContract;
      const x  = state.contracts.find(c => c.id === id);
      if (!x) {
        main.innerHTML = `<div class="page-h"><div><div class="num">Contracts</div><h1>Not found</h1></div></div>`;
        return;
      }
      const det = state.details[id];

      const tabs = ["summary", "schedule", "documents"];
      const labels = { summary: "Summary", schedule: "Schedule & payments", documents: "Documents" };
      const tabsHtml = tabs.map(t =>
        `<button class="tab ${t === detailTab ? "on" : ""}" data-tab="${t}" type="button">${labels[t]}</button>`
      ).join("");

      const signBtn = renderSignButton(x);

      let bodyHtml;
      if (!det) bodyHtml = `<div class="empty-state"><div class="empty-state-title">Loading</div><div class="empty-state-body">Fetching contract detail.</div></div>`;
      else if (detailTab === "summary")    bodyHtml = detailSummary(x, det);
      else if (detailTab === "schedule")   bodyHtml = detailSchedule(x, det);
      else                                 bodyHtml = detailDocuments(x, det);

      main.innerHTML = `
        <button class="detail-back" id="back-btn" type="button">← Back to contracts</button>
        <section class="page-h fade-up">
          <div>
            <div class="num">Contract · ${esc(id)}</div>
            <h1 style="font-size:42px;">${esc(x.party_b)}</h1>
            <p class="lede">${esc(x.type || "Interest rate swap")} · ${eur(x.notional)} ${esc(x.currency || "EUR")} · ${esc(x.effective_date)} → ${esc(x.termination_date)}</p>
          </div>
          <div class="aside" style="display:flex;gap:10px;align-items:center;">
            ${statusChip(x.workflow_status || x.status)}
            ${signBtn}
          </div>
        </section>
        <div class="tabs">${tabsHtml}</div>
        <div id="detail-body">${bodyHtml}</div>
      `;
      document.getElementById("back-btn").addEventListener("click", () => {
        exContract = null; render();
      });
      main.querySelectorAll(".tab").forEach(b => {
        b.addEventListener("click", () => { detailTab = b.dataset.tab; render(); });
      });
      const sb = document.getElementById("sign-btn-" + id);
      if (sb) sb.addEventListener("click", () => signContract(id));
      const sbA = document.getElementById("sign-btn-A-" + id);
      if (sbA) sbA.addEventListener("click", () => signContractP(id, "A"));
      const sbB = document.getElementById("sign-btn-B-" + id);
      if (sbB) sbB.addEventListener("click", () => signContractP(id, "B"));
      main.querySelectorAll('[data-act="openOracle"]').forEach(el =>
        el.addEventListener("click", e => { e.preventDefault(); nav("oracle"); }));
    }

    function renderSignButton(x) {
      const id = x.id;
      const wf = x.workflow_status || x.status;
      const ready = state.ready[id];
      const cmt   = state.comments[id];
      const openCmts = cmt?.open_count || 0;
      const canSign = (ready?.ready ?? false) && openCmts === 0;
      if (x.contract_mode === "peer_to_peer") {
        if (wf === "PENDING_COUNTERPARTY") return `<button id="sign-btn-B-${id}" class="btn btn-sm" type="button">Sign as Party B</button>`;
        if (wf === "PENDING_INITIATOR")    return `<button id="sign-btn-A-${id}" class="btn btn-ochre btn-sm" type="button">Countersign as Party A</button>`;
      }
      if (x.status !== "PENDING_SIGNATURE") return "";
      const cls   = canSign ? "btn btn-ochre btn-sm" : "btn btn-sm";
      const title = canSign ? "" : (ready ? `${ready.blocking_count || 0} document(s) required · ${openCmts} open comment(s)` : "Checking readiness…");
      const dis   = canSign ? "" : "disabled";
      return `<button id="sign-btn-${id}" class="${cls}" type="button" ${dis} title="${esc(title)}">Sign &amp; activate</button>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       Contract detail · Summary tab
       ────────────────────────────────────────────────────────────────── */
    function detailSummary(x, det) {
      const env = state.v2.latest;
      const estr = env?.datapoints?.find(d => d.metric === "ESTR");
      const rateTxt = estr ? formatDecimalRate(estr.value) : (state.oracle?.current_rate ? pct(state.oracle.current_rate) : "—");
      const seq = env?.attestation?.sequence_number;
      return `
        <div class="stack">
          <section class="card">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">A</span>
              <h2 class="section-title">Counterparty &amp; terms</h2>
            </div>
            <dl class="kv">
              <dt>Counterparty</dt><dd>${esc(x.party_b)}</dd>
              <dt>Your role</dt><dd>Party A · Calculation Agent</dd>
              <dt>Notional</dt><dd>${eur(x.notional)} ${esc(x.currency || "EUR")}</dd>
              <dt>Fixed leg</dt><dd>${pct(x.fixed_rate)}</dd>
              <dt>Floating leg</dt><dd>${esc(x.floating_index || "EURIBOR 3M")}</dd>
              <dt>Effective</dt><dd class="mono">${esc(x.effective_date)}</dd>
              <dt>Termination</dt><dd class="mono">${esc(x.termination_date)}</dd>
              <dt>Governing law</dt><dd>${esc(x.governing_law || "English law")} <span class="jargon">§13 ISDA 2002</span></dd>
            </dl>
          </section>

          <section class="card">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">B</span>
              <h2 class="section-title">Oracle reference</h2>
              <span class="section-sub">Used to compute the floating leg</span>
            </div>
            <div class="dp-tile" style="max-width:520px;">
              <div class="muted" style="font-size:12px;">Euro short-term rate <span class="jargon">ESTR</span></div>
              <div class="dp-value">${esc(rateTxt)}</div>
              <div style="font-size:12px;color:var(--ink-2);">European Central Bank <span class="jargon">ECB SDW</span></div>
              <div class="timestamp" style="margin-top:4px;">
                ${seq != null ? "Attestation #" + String(seq).padStart(3, "0") : "Awaiting first attestation"}
                · <a href="/oracle" data-act="openOracle" style="color:var(--ochre);text-decoration:underline;text-underline-offset:2px;">Open Oracle</a>
              </div>
            </div>
          </section>
        </div>
      `;
    }

    /* ──────────────────────────────────────────────────────────────────
       Contract detail · Schedule & payments tab
       ────────────────────────────────────────────────────────────────── */
    function detailSchedule(x, det) {
      const periods = det.periods || [];
      if (periods.length === 0) {
        return `<section class="card"><div class="empty-state">
          <div class="empty-state-title">No payment periods</div>
          <div class="empty-state-body">Once the contract is signed, the schedule will appear here.</div>
        </div></section>`;
      }
      const rows = periods.map(p => {
        const st = pStatus(p);
        const dir = p.net_payer === "PARTY_A"
          ? `<span class="chip chip-red"><span class="dot"></span><span>You pay</span></span>`
          : p.net_payer === "PARTY_B"
            ? `<span class="chip chip-green"><span class="dot"></span><span>You receive</span></span>`
            : "—";
        return `<tr>
          <td class="mono">P${p.number}</td>
          <td class="mono">${esc(p.payment_date)}</td>
          <td class="mono">${eur(p.fixed_amount)}</td>
          <td class="mono">${eur(p.floating_amount)}</td>
          <td class="mono"><span class="strong">${eur(p.net_amount)}</span></td>
          <td>${p.fixed_amount !== null ? dir : "—"}</td>
          <td class="mono muted">${p.oracle_rate != null ? pct(p.oracle_rate) : "—"}</td>
          <td>${pStatusChip(st)}</td>
        </tr>`;
      }).join("");
      return `<section class="card">
        <table class="table"><thead><tr>
          <th>#</th><th>Pay date</th><th>Fixed</th><th>Floating</th>
          <th>Net</th><th>Direction</th><th>Floating reset</th><th>Status</th>
        </tr></thead><tbody>${rows}</tbody></table>
      </section>`;
    }
    function pStatus(p) {
      if (p.payment_confirmed) return "confirmed";
      if (p.fixed_amount !== null) return "pending";
      if (p.payment_date < today()) return "overdue";
      return "future";
    }
    function pStatusChip(st) {
      const m = {
        confirmed: { cls: "chip-green", label: "Confirmed" },
        pending:   { cls: "chip-ochre", label: "Pending PI" },
        overdue:   { cls: "chip-red",   label: "Overdue" },
        future:    { cls: "chip-blue",  label: "Scheduled" },
      };
      const x = m[st] || { cls: "", label: st };
      return `<span class="chip ${x.cls}"><span class="dot"></span><span>${x.label}</span></span>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       Contract detail · Documents tab (PDF + DD upload + comments)
       ────────────────────────────────────────────────────────────────── */
    function detailDocuments(x, det) {
      const id = x.id;
      const dd = state.dd[id] || {};
      const cmt = state.comments[id] || { comments: [], open_count: 0 };
      const docs = dd.documents || [];
      const preDocs  = docs.filter(d => d.is_pre_signing);
      const postDocs = docs.filter(d => !d.is_pre_signing);

      function docTable(list, caption) {
        if (!list.length) return "";
        const rows = list.map(d => `<tr>
          <td>${esc(d.description || d.doc_type)}</td>
          <td>${docStatusChip(d.status)}</td>
          <td class="mono muted">${esc(d.due_date_obligation || "—")}</td>
          <td>${(d.status === "REQUIRED" || d.status === "REJECTED" || d.status === "EXPIRED")
            ? `<button class="btn btn-sm" data-upload-doc="${esc(d.doc_id)}" data-doc-type="${esc(d.doc_type)}" type="button">Upload</button>`
            : d.status === "UPLOADED"
              ? `<span class="muted" style="font-size:12px;">Awaiting review</span>`
              : `<span class="chip chip-green"><span class="dot"></span><span>Accepted</span></span>`}</td>
        </tr>`).join("");
        return `<div class="field-label" style="margin-top:14px;">${esc(caption)}</div>
          <table class="table"><thead><tr><th>Document</th><th>Status</th><th>Due</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
      }

      const pdfHtml = (x.status === "PENDING_SIGNATURE" || x.status === "ACTIVE")
        ? `<section class="card">
            <div class="section-h" style="margin-bottom:14px;">
              <span class="section-num">A</span>
              <h2 class="section-title">Confirmation PDF</h2>
              <span class="section-sub"><a href="/api/contracts/${esc(id)}/pdf" download="confirmation-${esc(id)}.pdf" style="color:var(--ochre);text-decoration:underline;text-underline-offset:2px;">Download</a></span>
            </div>
            <iframe class="pdf-frame" src="/api/contracts/${esc(id)}/pdf" title="Confirmation — ${esc(id)}"></iframe>
          </section>` : "";

      const ddHtml = `<section class="card">
        <div class="section-h" style="margin-bottom:14px;">
          <span class="section-num">B</span>
          <h2 class="section-title">Due diligence</h2>
          <span class="section-sub">${esc(dd.rag_status || "—")}</span>
        </div>
        ${docTable(preDocs, "Pre-signing")}
        ${docTable(postDocs, "Post-signing (ongoing)")}
        ${docs.length === 0 ? `<div class="empty-state"><div class="empty-state-title">No documents listed</div><div class="empty-state-body">Your advisor has not yet attached a due-diligence checklist.</div></div>` : ""}
      </section>`;

      const cmtHtml = `<section class="card">
        <div class="section-h" style="margin-bottom:14px;">
          <span class="section-num">C</span>
          <h2 class="section-title">Comments</h2>
          <span class="section-sub">${cmt.open_count || 0} open</span>
        </div>
        ${cmt.comments.length
          ? cmt.comments.map(c => `<div style="padding:10px 0;border-bottom:1px dashed var(--hair);">
              <div class="muted" style="font-size:11px;font-family:var(--mono);margin-bottom:4px;">${esc(c.author)} · ${esc((c.timestamp || "").slice(0,16).replace("T"," "))} UTC · ${esc(c.status)}</div>
              <div style="font-size:13px;color:var(--ink);">${esc(c.text)}</div>
            </div>`).join("")
          : `<div class="muted" style="font-size:13px;">No comments yet. Your advisor will respond here.</div>`}
      </section>`;

      // Wire the Upload buttons after innerHTML is set in renderContractDetail
      queueMicrotask(() => {
        document.querySelectorAll("[data-upload-doc]").forEach(btn => {
          btn.addEventListener("click", () => uploadDDDoc(id, btn.dataset.uploadDoc, btn.dataset.docType, btn));
        });
      });

      return `<div class="stack">${pdfHtml}${ddHtml}${cmtHtml}</div>`;
    }
    function docStatusChip(st) {
      const m = {
        REQUIRED:     { cls: "chip-red",   label: "Required" },
        UPLOADED:     { cls: "chip-blue",  label: "Uploaded" },
        VALIDATED:    { cls: "chip-green", label: "Validated" },
        REJECTED:     { cls: "chip-red",   label: "Rejected" },
        EXPIRED:      { cls: "chip-red",   label: "Expired" },
        NOT_REQUIRED: { cls: "",           label: "N/A" },
      };
      const x = m[st] || { cls: "", label: st };
      return `<span class="chip ${x.cls}"><span class="dot"></span><span>${x.label}</span></span>`;
    }

    /* ──────────────────────────────────────────────────────────────────
       View 3 — Documents (entity + per-contract)
       ────────────────────────────────────────────────────────────────── */
    async function ensureDDLoaded() {
      const tasks = state.contracts.flatMap(x => {
        const t = [];
        if (!state.dd[x.id])    t.push(apiFetch(`/api/contracts/${x.id}/due-diligence`).then(r => { if (r.ok) state.dd[x.id] = r.data; }));
        if (!state.ready[x.id]) t.push(apiFetch(`/api/contracts/${x.id}/signing-readiness`).then(r => { if (r.ok) state.ready[x.id] = r.data; }));
        return t;
      });
      if (tasks.length) await Promise.all(tasks);
    }

    async function renderDocuments(main) {
      main.innerHTML = `
        <section class="page-h fade-up">
          <div>
            <div class="num">01 · Documents</div>
            <h1>Documents</h1>
            <p class="lede">Required documents for your active and pending contracts.</p>
          </div>
        </section>
        <div class="stack" id="docs-stack">
          <div class="empty-state"><div class="empty-state-title">Loading</div><div class="empty-state-body">Fetching due-diligence checklists.</div></div>
        </div>
      `;
      await ensureDDLoaded();

      const stack = document.getElementById("docs-stack");
      if (!stack) return;
      if (state.contracts.length === 0) {
        stack.innerHTML = `<div class="empty-state"><div class="empty-state-title">Nothing required yet</div><div class="empty-state-body">Once your advisor drafts a contract, the document checklist will appear here.</div></div>`;
        return;
      }
      stack.innerHTML = state.contracts.map(x => contractDocsBlock(x)).join("");
      stack.querySelectorAll("[data-upload-doc]").forEach(btn => {
        btn.addEventListener("click", () => {
          const cid    = btn.dataset.contractId;
          const docId  = btn.dataset.uploadDoc;
          const dtype  = btn.dataset.docType;
          const entity = btn.dataset.entityName || "";
          uploadDDDoc(cid, docId, dtype, btn, entity);
        });
      });
    }

    function contractDocsBlock(x) {
      const dd = state.dd[x.id];
      if (!dd) return `<section class="card"><div class="muted">${esc(x.id)} — not available</div></section>`;
      const tiers   = dd.document_tiers || {};
      const genA    = tiers.general_party_a || [];
      const genB    = tiers.general_party_b || [];
      const csDocs  = tiers.contract_specific || dd.documents || [];
      function docRow(d, contractId, entityName) {
        const action = (d.status === "REQUIRED" || d.status === "REJECTED" || d.status === "EXPIRED")
          ? `<button class="btn btn-sm" type="button"
                data-upload-doc="${esc(d.doc_id)}"
                data-doc-type="${esc(d.doc_type)}"
                data-contract-id="${esc(contractId)}"
                data-entity-name="${esc(entityName || "")}">Upload</button>`
          : d.status === "UPLOADED"
            ? `<span class="muted" style="font-size:12px;">Awaiting review</span>`
            : `<span class="chip chip-green"><span class="dot"></span><span>Accepted</span></span>`;
        return `<tr>
          <td>${esc(d.description || d.doc_type)}<div class="muted" style="font-size:11px;">${esc(d.linked_obligation || "")}</div></td>
          <td>${docStatusChip(d.status)}</td>
          <td class="mono muted">${esc(d.due_date_obligation || "—")}</td>
          <td>${action}</td>
        </tr>`;
      }
      function group(list, caption, entityName) {
        if (!list.length) return "";
        const rows = list.map(d => docRow(d, x.id, entityName)).join("");
        return `<div class="field-label" style="margin-top:14px;">${esc(caption)}</div>
          <table class="table"><thead><tr><th>Document</th><th>Status</th><th>Due</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
      }
      return `<section class="card">
        <div class="section-h" style="margin-bottom:14px;">
          <span class="section-num">${esc(x.id)}</span>
          <h2 class="section-title">${esc(x.party_b)}</h2>
          <span class="section-sub">${statusChip(x.workflow_status || x.status)}</span>
        </div>
        ${group(genA, "Entity documents · Party A", x.party_a)}
        ${group(genB, "Entity documents · Party B", x.party_b)}
        ${group(csDocs.filter(d => d.is_pre_signing),  "Pre-signing", "")}
        ${group(csDocs.filter(d => !d.is_pre_signing), "Post-signing (ongoing)", "")}
      </section>`;
    }

    async function uploadDDDoc(contractId, docId, docType, btn, entityName = "") {
      const label = entityName ? `${docType} for ${entityName}` : `${docType} for ${contractId}`;
      if (!confirm(`Submit ${label}?\n\nA stub document will be uploaded for advisor review.`)) return;
      btn.disabled = true; const orig = btn.textContent; btn.textContent = "Uploading…";
      const payload = {
        doc_id: docId,
        document_type: docType,
        filename: docType.toLowerCase().replace(/_/g, "-") + ".pdf",
        uploaded_by: entityName || ("Client — " + contractId),
        file_content_b64: btoa("STUB_CONTENT"),
      };
      const path = entityName
        ? `/api/entities/${encodeURIComponent(entityName)}/documents/upload`
        : `/api/contracts/${contractId}/due-diligence/upload`;
      const r = await apiFetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (r.ok) {
        delete state.dd[contractId]; delete state.ready[contractId];
        toast(`${docType} uploaded — awaiting review`, "info");
        await refresh();
      } else {
        toast("Upload failed: " + (r.error || "unknown"), "error");
        btn.disabled = false; btn.textContent = orig;
      }
    }

    /* ──────────────────────────────────────────────────────────────────
       View 4 — Profile
       ────────────────────────────────────────────────────────────────── */
    function renderProfile(main) {
      const P = state.profile || {};
      main.innerHTML = `
        <section class="page-h fade-up">
          <div>
            <div class="num">01 · Profile</div>
            <h1>Profile</h1>
            <p class="lede">Your company information and signing identity.</p>
          </div>
        </section>
        <section class="card fade-up">
          <div class="section-h" style="margin-bottom:18px;">
            <span class="section-num">A</span>
            <h2 class="section-title">Company details</h2>
          </div>
          <div class="profile-grid">
            <div>
              <label class="field-label" for="pf-name">Legal company name</label>
              <input id="pf-name" class="input" value="${esc(P.company_name || "")}" placeholder="Alpha Corp S.A." />
            </div>
            <div>
              <label class="field-label" for="pf-juris">Jurisdiction</label>
              <input id="pf-juris" class="input" value="${esc(P.jurisdiction || "")}" placeholder="FR" maxlength="2" />
            </div>
            <div>
              <label class="field-label" for="pf-lei">LEI</label>
              <input id="pf-lei" class="input" value="${esc(P.lei || "")}" placeholder="2138007XKZTKFHVXL357" />
            </div>
            <div>
              <label class="field-label" for="pf-email">Contact email</label>
              <input id="pf-email" class="input" type="email" value="${esc(P.contact_email || "")}" placeholder="legal@alphacorp.com" />
            </div>
            <div class="full">
              <label class="field-label" for="pf-key">Advisor key <span class="muted" style="text-transform:none;letter-spacing:0;">(required to save · provided by Linklaters LLP)</span></label>
              <input id="pf-key" class="input" type="password" value="${esc(P.advisor_key || "")}" />
            </div>
          </div>
          <div style="margin-top:20px;display:flex;gap:10px;align-items:center;">
            <button id="pf-save" class="btn btn-ochre" type="button">Save</button>
            <span id="pf-msg" class="muted" style="font-size:12px;"></span>
          </div>
        </section>

        <section class="card fade-up" style="margin-top:18px;">
          <div class="section-h" style="margin-bottom:14px;">
            <span class="section-num">B</span>
            <h2 class="section-title">Legal advisor</h2>
          </div>
          <dl class="kv">
            <dt>Firm</dt><dd>Linklaters LLP</dd>
            <dt>Calculation Agent</dt><dd>Party A</dd>
            <dt>Master Agreement</dt><dd>2002 (English law)</dd>
            <dt>Governing Law</dt><dd><span class="jargon">§13 ISDA 2002</span></dd>
          </dl>
        </section>
      `;
      document.getElementById("pf-save").addEventListener("click", saveProfile);
    }

    async function saveProfile() {
      const btn = document.getElementById("pf-save");
      const msg = document.getElementById("pf-msg");
      btn.disabled = true; btn.textContent = "Saving…";
      const r = await apiFetch("/api/client/profile", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          company_name:  document.getElementById("pf-name").value,
          jurisdiction:  document.getElementById("pf-juris").value,
          lei:           document.getElementById("pf-lei").value,
          contact_email: document.getElementById("pf-email").value,
          advisor_key:   document.getElementById("pf-key").value,
        }),
      });
      if (r.ok && r.data) {
        state.profile = r.data.profile || r.data;
        msg.textContent = "Saved.";
        msg.style.color = "var(--green)";
      } else {
        msg.textContent = "Save failed: " + (r.error || "unknown");
        msg.style.color = "var(--red)";
      }
      btn.disabled = false; btn.textContent = "Save";
    }

    /* ──────────────────────────────────────────────────────────────────
       Sign flows (managed + peer-to-peer) — preserve existing API calls
       ────────────────────────────────────────────────────────────────── */
    async function signContract(id) {
      const btn = document.getElementById("sign-btn-" + id);
      if (btn) { btn.disabled = true; btn.textContent = "Checking…"; }
      const ready = await apiFetch(`/api/contracts/${id}/signing-readiness`);
      if (!(ready.ok && ready.data?.ready)) {
        const m = ready.data?.message || "Signing readiness check failed";
        if (btn) { btn.disabled = false; btn.textContent = "Sign & activate"; }
        toast("Cannot sign: " + m, "error");
        return;
      }
      if (btn) btn.textContent = "Signing…";
      const r = await apiFetch(`/api/contracts/${id}/sign?signed_by=${encodeURIComponent("Client — " + id)}`, { method: "POST" });
      if (r.ok) {
        delete state.details[id]; delete state.comments[id]; delete state.ready[id];
        await refresh();
        toast("Contract signed and activated.", "info");
      } else {
        if (btn) { btn.disabled = false; btn.textContent = "Sign & activate"; }
        toast("Sign failed: " + (r.error || "unknown"), "error");
      }
    }

    async function signContractP(id, party) {
      const btn = document.getElementById(`sign-btn-${party}-` + id);
      if (btn) { btn.disabled = true; btn.textContent = "Checking…"; }
      const ready = await apiFetch(`/api/contracts/${id}/signing-readiness`);
      if (!(ready.ok && ready.data?.ready)) {
        if (btn) { btn.disabled = false; btn.textContent = party === "A" ? "Countersign as Party A" : "Sign as Party B"; }
        toast("Cannot sign yet: " + (ready.data?.message || "readiness check failed"), "error");
        return;
      }
      if (btn) btn.textContent = "Signing…";
      const partyLabel = party === "A" ? `Creator — ${id}` : `Counterparty — ${id}`;
      const r = await apiFetch(`/api/contracts/${id}/sign?signed_by=${encodeURIComponent(partyLabel)}&party=${party}`, { method: "POST" });
      if (r.ok) {
        delete state.details[id]; delete state.comments[id]; delete state.ready[id];
        await refresh();
        toast(r.data?.activated ? "Both parties signed — contract is active." : `Signed as Party ${party}.`, "info");
      } else {
        if (btn) { btn.disabled = false; btn.textContent = party === "A" ? "Countersign as Party A" : "Sign as Party B"; }
        toast("Sign failed: " + (r.error || "unknown"), "error");
      }
    }

    /* ──────────────────────────────────────────────────────────────────
       Direct contract creation modal (preserves submitDC + /api/contracts/direct)
       ────────────────────────────────────────────────────────────────── */
    function openDirectContract() {
      const tomorrow2 = new Date(); tomorrow2.setDate(tomorrow2.getDate() + 2);
      const term2y    = new Date(); term2y.setFullYear(term2y.getFullYear() + 2);
      const fmt = d => d.toISOString().slice(0,10);
      const myName  = state.profile?.company_name || "";
      const myJuris = (state.profile?.jurisdiction || "").toUpperCase();
      const html = `
        <div class="modal-bg" id="dc-bg">
          <div class="modal" role="dialog" aria-modal="true">
            <div class="modal-h">
              <div class="section-h" style="border:0;padding:0;margin:0;">
                <span class="section-num">New</span>
                <h2 class="section-title">Direct contract</h2>
              </div>
              <div class="muted" style="font-size:12.5px;margin-top:8px;">
                Peer-to-peer interest rate swap. Standard ISDA 2002 defaults apply. Both parties must sign to activate.
              </div>
            </div>
            <div class="modal-b">
              <div class="profile-grid">
                <div><label class="field-label">Your company</label><input id="dc-myname" class="input" value="${esc(myName)}" /></div>
                <div><label class="field-label">Your jurisdiction</label><input id="dc-myjuris" class="input" value="${esc(myJuris)}" maxlength="2" /></div>
                <div><label class="field-label">Counterparty</label><input id="dc-cpname" class="input" placeholder="Beta Fund Ltd" /></div>
                <div><label class="field-label">Counterparty jurisdiction</label><input id="dc-cpjuris" class="input" value="GB" maxlength="2" /></div>
                <div class="full"><label class="field-label">Counterparty email (optional)</label><input id="dc-cpemail" class="input" type="email" /></div>
                <div><label class="field-label">Notional (EUR)</label><input id="dc-notional" class="input" type="number" placeholder="10000000" /></div>
                <div><label class="field-label">Fixed rate (%)</label><input id="dc-rate" class="input" type="number" step="0.001" placeholder="3.200" /></div>
                <div><label class="field-label">Effective date</label><input id="dc-eff" class="input" type="date" value="${fmt(tomorrow2)}" /></div>
                <div><label class="field-label">Termination date</label><input id="dc-term" class="input" type="date" value="${fmt(term2y)}" /></div>
              </div>
              <div class="muted" style="font-size:11.5px;margin-top:12px;">
                Defaults: EUR · EURIBOR 3M floating · Quarterly payments · English law.
              </div>
              <div id="dc-err" style="font-size:12px;color:var(--red);margin-top:10px;"></div>
            </div>
            <div class="modal-f">
              <button class="btn" id="dc-cancel" type="button">Cancel</button>
              <button class="btn btn-ochre" id="dc-submit" type="button">Create contract</button>
            </div>
          </div>
        </div>`;
      const wrap = document.createElement("div");
      wrap.innerHTML = html;
      const node = wrap.firstElementChild;
      document.body.appendChild(node);
      const close = () => node.remove();
      node.addEventListener("click", e => { if (e.target === node) close(); });
      node.querySelector("#dc-cancel").addEventListener("click", close);
      node.querySelector("#dc-submit").addEventListener("click", () => submitDC(node, close));
    }

    async function submitDC(node, close) {
      const err = node.querySelector("#dc-err");
      err.textContent = "";
      const v = id => node.querySelector("#" + id).value.trim();
      const myName = v("dc-myname"), myJuris = v("dc-myjuris").toUpperCase();
      const cpName = v("dc-cpname"), cpJuris = v("dc-cpjuris").toUpperCase();
      const cpEmail = v("dc-cpemail");
      const notional = parseFloat(v("dc-notional"));
      const rate     = parseFloat(v("dc-rate"));
      const eff      = v("dc-eff"), term = v("dc-term");
      if (!myName)                 return err.textContent = "Your company name is required";
      if (!cpName)                 return err.textContent = "Counterparty name is required";
      if (!notional || notional<=0) return err.textContent = "Enter a valid notional";
      if (!rate || rate <= 0)      return err.textContent = "Enter a valid rate (e.g. 3.2)";
      if (rate >= 50)              return err.textContent = "Rate must be less than 50%";
      if (!eff || !term)           return err.textContent = "Both dates are required";
      if (eff >= term)             return err.textContent = "Termination must be after effective date";

      const btn = node.querySelector("#dc-submit"); btn.disabled = true; btn.textContent = "Creating…";
      const r = await apiFetch("/api/contracts/direct", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          my_name: myName, my_jurisdiction: myJuris,
          counterparty_name: cpName, counterparty_jurisdiction: cpJuris,
          counterparty_email: cpEmail,
          notional, fixed_rate: rate / 100,
          effective_date: eff, termination_date: term, currency: "EUR",
        }),
      });
      if (r.ok && r.data) {
        toast(`Contract ${r.data.contract_id} created — waiting for ${cpName} to sign first.`, "info");
        close(); await refresh();
      } else {
        err.textContent = "Error: " + (r.error || "unknown");
        btn.disabled = false; btn.textContent = "Create contract";
      }
    }
  </script>
